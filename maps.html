<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쟈쟈서버 지도정보</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f7fd; --bg2:#e8f2fc; --white:#ffffff;
  --s1:#f0f7fd; --s2:#e3f0fb;
  --border:#dbe9f7; --border2:#bcd8f2;
  --a1:#2f7fd6; --a2:#22b6c9; --a3:#5aa8ea; --a4:#f5a623; --a5:#6fd0a0;
  --t1:#12253f; --t2:#4c6a8c; --t3:#8ea6c2; --t4:#c7dcf0;
  --ok:#3d9e6e; --err:#e05a5a;
  --shadow:0 4px 24px rgba(47,127,214,0.12);
  --shadow2:0 8px 32px rgba(47,127,214,0.18);
}
[data-theme="dark"] {
  --bg:#0a1420; --bg2:#0f1e30; --white:#132335;
  --s1:#16283c; --s2:#1c3149;
  --border:#233c56; --border2:#2c4a68;
  --t1:#e6f0fb; --t2:#a9c2dc; --t3:#7391b0; --t4:#4a637d;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow2:0 8px 32px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--t1); min-height: 100vh;
  background-image:
    radial-gradient(circle 600px at 10% 10%, rgba(47,127,214,0.08) 0%, transparent 100%),
    radial-gradient(circle 700px at 90% 30%, rgba(34,182,201,0.07) 0%, transparent 100%),
    radial-gradient(circle 500px at 50% 90%, rgba(111,208,192,0.08) 0%, transparent 100%);
}
/* ===== 사이드바 ===== */
.sidebar{width:300px;height:100vh;background:var(--white);border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;position:fixed;left:-300px;top:0;z-index:200;
  transition:left .32s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(47,127,214,0.08);}
.sidebar.open{left:0;}
.sb-head{padding:20px 16px 14px;border-bottom:1.5px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;font-weight:900;
  font-size:16px;color:var(--a1);margin-bottom:4px;}
.sb-logo-dot{width:8px;height:8px;background:var(--a2);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(2)}}
.sb-sub{font-size:10.5px;color:var(--t3);font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:.5px;}
.sb-nav{display:flex;flex-direction:column;gap:5px;padding:12px 16px;border-bottom:1.5px solid var(--border);}
.sb-nav a{display:flex;align-items:center;gap:9px;text-decoration:none;padding:10px 12px;border-radius:13px;
  font-size:13px;font-weight:800;color:var(--t2);background:var(--s1);border:1.5px solid var(--border);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s ease;}
.sb-nav a:hover{transform:translateX(3px);box-shadow:0 4px 12px rgba(47,127,214,.18);}
.sb-nav a.on{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-color:transparent;}
.sb-body{padding:14px 16px 16px;flex:1;overflow-y:auto;min-height:0;font-size:12.5px;color:var(--t2);line-height:1.7;}
.sb-info-box{background:var(--s1);border:1.5px solid var(--border);border-radius:14px;padding:14px;}
.sb-info-box b{color:var(--t1);}
.sb-footer{padding:12px 16px;border-top:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sb-footer-txt{font-size:10.5px;color:var(--t3);}
.toggle-btn{position:fixed;top:16px;left:16px;z-index:300;width:42px;height:42px;background:var(--white);
  border:1.5px solid var(--border);border-radius:12px;color:var(--a1);font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;box-shadow:var(--shadow);}
.toggle-btn:hover{border-color:var(--a1);box-shadow:var(--shadow2);transform:scale(1.05);}
.toggle-btn.sb-open{left:314px;}
@media(max-width:820px){ .toggle-btn.sb-open{left:auto;right:16px;} .main.shifted{margin-left:0;} }
.sb-backdrop{position:fixed;inset:0;background:rgba(12,25,42,0.4);backdrop-filter:blur(2px);
  z-index:190;opacity:0;pointer-events:none;transition:opacity .25s ease;display:none;}
.sb-backdrop.open{opacity:1;pointer-events:auto;}
@media(max-width:820px){ .sb-backdrop{display:block;} }
.dark-toggle{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);background:var(--white);
  cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;transition:all .3s;}
[data-theme="dark"] .toggle-moon{display:inline;} [data-theme="dark"] .toggle-sun{display:none !important;}
[data-theme="light"] .toggle-moon{display:none !important;} [data-theme="light"] .toggle-sun{display:inline;}
.main{flex:1;min-height:100vh;transition:margin-left .32s cubic-bezier(.4,0,.2,1);}
.main.shifted{margin-left:300px;}
.main-inner{max-width:960px;margin:0 auto;padding:70px 20px 80px;}

/* ── header ── */
.page-head { text-align: center; padding: 6px 0 22px; }
.wind-badge { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg,var(--s2),#e0f7fa);
  border: 1.5px solid var(--border2); border-radius: 20px; padding: 6px 14px; font-size: 11px; font-weight: 800;
  font-family: 'Nunito', sans-serif; color: var(--t2); letter-spacing: 1px; margin-bottom: 12px; box-shadow: 0 4px 12px rgba(47,127,214,.12); }
.wind-badge-dot { width: 7px; height: 7px; background: var(--a2); border-radius: 50%; animation: pulse 2s infinite; }
.page-title { font-family: 'Nunito', sans-serif; font-size: 34px; font-weight: 900; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--a1) 0%, var(--a2) 60%, var(--a5) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.15; margin-bottom: 6px; }
.page-sub { font-size: 12px; color: var(--t3); font-family: 'Nunito', sans-serif; font-weight: 700; letter-spacing: 1px; }

/* ── 카테고리 필터 칩 ── */
.cat-chip-wrap{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:20px;}
.cat-chip{padding:7px 15px;border-radius:99px;font-size:12.5px;font-weight:800;cursor:pointer;
  background:var(--white);border:1.5px solid var(--border);color:var(--t2);transition:all .15s;}
.cat-chip:hover{border-color:var(--a1);color:var(--a1);}
.cat-chip.on{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-color:transparent;}

/* ── 지도 그리드 ── */
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.map-card{background:var(--white);border:1.5px solid var(--border);border-radius:18px;overflow:hidden;
  cursor:pointer;transition:transform .18s,box-shadow .18s;}
.map-card:hover{transform:translateY(-3px);box-shadow:var(--shadow2);border-color:var(--a1);}
.map-thumb-wrap{width:100%;aspect-ratio:202/150;background:var(--s1);overflow:hidden;position:relative;}
.map-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.map-card-body{padding:10px 12px 12px;}
.map-card-cat{display:inline-block;font-size:9.5px;font-weight:900;color:var(--a1);background:var(--s2);
  padding:2px 8px;border-radius:7px;margin-bottom:6px;letter-spacing:.3px;}
.map-card-title{font-size:13.5px;font-weight:800;color:var(--t1);line-height:1.4;}

.empty-state{text-align:center;padding:50px 20px;color:var(--t3);}
.empty-state-emoji{font-size:40px;margin-bottom:10px;}

/* ── 팝업(모달) 뷰어: 위에 목록, 아래 큰 이미지 ── */
#map-modal{position:fixed;inset:0;background:rgba(10,20,32,.72);backdrop-filter:blur(4px);
  z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
#map-modal.open{display:flex;}
.mv-box{background:var(--white);border-radius:22px;max-width:920px;width:100%;max-height:92vh;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.mv-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
  border-bottom:1.5px solid var(--border);flex-shrink:0;}
.mv-header-title{font-size:15px;font-weight:900;color:var(--t1);}
.mv-close{width:34px;height:34px;border-radius:50%;border:none;background:var(--s1);color:var(--t2);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.mv-close:hover{background:var(--err);color:#fff;}
/* 위쪽 썸네일 리스트(가로 스크롤) */
.mv-list{display:flex;gap:8px;padding:12px 14px;overflow-x:auto;flex-shrink:0;border-bottom:1.5px solid var(--border);background:var(--s1);}
.mv-list::-webkit-scrollbar{height:5px;} .mv-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.mv-list-item{flex-shrink:0;width:78px;cursor:pointer;border-radius:10px;overflow:hidden;
  border:2.5px solid transparent;transition:border-color .15s,transform .15s;}
.mv-list-item:hover{transform:translateY(-2px);}
.mv-list-item.active{border-color:var(--a1);}
.mv-list-item img{width:78px;height:58px;object-fit:cover;display:block;background:var(--white);}
.mv-list-item-label{font-size:8.5px;font-weight:700;color:var(--t2);text-align:center;padding:2px 2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--white);}
/* 아래쪽 큰 이미지 뷰어 */
.mv-viewer{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:#0d1620;padding:10px;min-height:200px;}
.mv-viewer img{max-width:100%;max-height:76vh;object-fit:contain;border-radius:6px;}
.mv-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;
  border-top:1.5px solid var(--border);flex-shrink:0;flex-wrap:wrap;gap:8px;}
.mv-footer-cat{font-size:11px;font-weight:800;color:var(--a1);background:var(--s2);padding:4px 10px;border-radius:8px;}
.mv-orig-link{font-size:12px;font-weight:800;color:var(--a1);text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.mv-orig-link:hover{text-decoration:underline;}

@media(max-width:520px){ .page-title{font-size:26px;} .main-inner{padding:16px 14px 60px;}
  .mv-box{max-height:96vh;} .mv-viewer img{max-height:56vh;} }
</style>
</head>
<body>

<button class="toggle-btn" id="toggleBtn">☰</button>
<div class="sb-backdrop" id="sbBackdrop"></div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="sb-logo"><span class="sb-logo-dot"></span>SA 쟈쟈</div>
    <div class="sb-sub">JYAJYA SERVER TOOLS</div>
  </div>
  <div class="sb-nav" id="sbNav"></div>
  <div class="sb-body">
    <div class="sb-info-box">
      🗺️ <b>지도정보</b><br><br>
      공홈 지도게시판(지도정보) 1페이지 기준 <b id="sb-map-count">-</b>개 지도를 모아왔어요.<br><br>
      카드를 클릭하면 목록이 위에 뜨는 팝업으로 크게 볼 수 있어요.<br><br>
      <span style="color:var(--t3);">※ 공홈에 지도가 더 올라오면 알려주세요, 추가해드릴게요.</span>
    </div>
  </div>
  <div class="sb-footer">
    <span class="sb-footer-txt" id="mapCountFooter">-개 지도</span>
    <button class="dark-toggle" onclick="toggleDark()"><span class="toggle-moon">🌙</span><span class="toggle-sun">☀️</span></button>
  </div>
</div>

<div class="main" id="main">
<div class="main-inner">

  <div class="page-head">
    <div class="wind-badge"><span class="wind-badge-dot"></span><span>SA JYAJYA · MAP INFO</span></div>
    <h1 class="page-title">🗺️ 지도정보</h1>
    <div class="page-sub">지도를 골라서 크게 확인해보세요</div>
  </div>

  <div class="cat-chip-wrap" id="cat-chips"></div>

  <div class="map-grid" id="map-grid"></div>
  <div class="empty-state" id="empty-state" style="display:none;">
    <div class="empty-state-emoji">🗺️</div>
    <div>해당 카테고리에 지도가 없어요</div>
  </div>

</div>
</div>

<!-- 팝업 뷰어: 위에 목록, 아래 큰 이미지 -->
<div id="map-modal">
  <div class="mv-box">
    <div class="mv-header">
      <div class="mv-header-title" id="mv-title">-</div>
      <button class="mv-close" onclick="closeMapModal()">✕</button>
    </div>
    <div class="mv-list" id="mv-list"></div>
    <div class="mv-viewer">
      <img id="mv-img" src="" alt="지도 이미지" onerror="handleImgError(this)">
    </div>
    <div class="mv-footer">
      <span class="mv-footer-cat" id="mv-cat">-</span>
      <a class="mv-orig-link" id="mv-orig" href="#" target="_blank" rel="noopener noreferrer">🔗 원본 게시글에서 크게 보기</a>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   사이드바 / 다크모드
   ═══════════════════════════════════════════════════════════ */
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleBtn");
const mainEl = document.getElementById("main");
const sbBackdrop = document.getElementById("sbBackdrop");
function setSidebar(open){
  sidebar.classList.toggle("open", open);
  toggleBtn.classList.toggle("sb-open", open);
  mainEl.classList.toggle("shifted", open);
  sbBackdrop.classList.toggle("open", open);
  toggleBtn.textContent = open ? "✕" : "☰";
  try{ localStorage.setItem('sa2-sb', open ? '1' : '0'); }catch(e){}
}
toggleBtn.addEventListener("click", ()=> setSidebar(!sidebar.classList.contains("open")));
sbBackdrop.addEventListener("click", ()=> setSidebar(false));
try{
  const sbSaved = localStorage.getItem('sa2-sb');
  setSidebar(sbSaved === null ? window.innerWidth > 820 : sbSaved === '1');
}catch(e){ setSidebar(window.innerWidth > 820); }

function toggleDark(){
  const h=document.documentElement;
  const n=h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme', n);
  try{ localStorage.setItem('sa2-theme', n); }catch(e){}
}
try{ const saved=localStorage.getItem('sa2-theme'); if(saved) document.documentElement.setAttribute('data-theme', saved); }catch(e){}

/* ═══════════════════════════════════════════════════════════
   지도 데이터 (공홈 지도게시판 1페이지 기준)
   thumb: 게시판 목록 썸네일 / full: 추정 원본 경로(안되면 자동으로 썸네일로 대체)
   ═══════════════════════════════════════════════════════════ */
const BOARD_URL = "https://sa000001.com/bbs/board.php?bo_table=s2_map";
const MAPS = [
  { id:1,   cat:"사이너스", title:"사이너스 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-feb1d4ced69e4b34dfb3373d9967356b_1782236319_254_202x150.png" },
  { id:99,  cat:"공지",     title:"상점 (구매 위치 정보)", thumb:"https://sa000001.com/data/editor/2502/thumb-77a34ab8117c1c470e546aa6965d0a59_1740647367_5312_202x150.png" },
  { id:98,  cat:"전체",     title:"가이아 섬 전체지도", thumb:"https://sa000001.com/data/editor/2502/thumb-a6353f7e848d23c69d24ce879277fec4_1740046840_4651_202x150.png" },
  { id:94,  cat:"전체",     title:"에레보스 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-feb1d4ced69e4b34dfb3373d9967356b_1782236308_8428_202x150.png" },
  { id:93,  cat:"전체",     title:"하이하모 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-feb1d4ced69e4b34dfb3373d9967356b_1782236295_6378_202x150.png" },
  { id:92,  cat:"전체",     title:"포우렌 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-feb1d4ced69e4b34dfb3373d9967356b_1782236279_3602_202x150.png" },
  { id:90,  cat:"전체",     title:"가우린 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-7af8735c42d805a8a677d820eeea962f_1782236215_5567_202x150.png" },
  { id:91,  cat:"전체",     title:"세르노스 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-7af8735c42d805a8a677d820eeea962f_1782236199_5609_202x150.png" },
  { id:89,  cat:"전체",     title:"쟈루 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-cd0c9602d6dac7a3078b19f6ae0a40d1_1782236173_974_202x150.png" },
  { id:109, cat:"전체",     title:"사냥터", thumb:"https://sa000001.com/data/editor/2606/thumb-d5fab41b3c2cd9c6ad5e5c2d85fecbc8_1782797423_2094_202x150.png" },
  { id:108, cat:"세르노스", title:"포루섬 전체지도", thumb:"https://sa000001.com/data/editor/2503/thumb-d06c3aac20d35e7c94461f6fe7791092_1742750480_0263_202x150.png" },
  { id:107, cat:"사이너스", title:"원주민섬 전체지도", thumb:"https://sa000001.com/data/editor/2503/thumb-d06c3aac20d35e7c94461f6fe7791092_1742750451_5546_202x150.png" },
  { id:106, cat:"가이아",   title:"물의 해변 (수속성레이드)", thumb:"https://sa000001.com/data/editor/2502/thumb-65ee93eb244be7335a09c37cd9593121_1740695204_2489_202x150.png" },
  { id:105, cat:"가이아",   title:"바람의 동굴 (풍속성레이드)", thumb:"https://sa000001.com/data/editor/2502/thumb-65ee93eb244be7335a09c37cd9593121_1740695230_9994_202x150.png" },
  { id:104, cat:"가이아",   title:"땅의 숲 (지속성 레이드)", thumb:"https://sa000001.com/data/editor/2502/thumb-86aed2272a49228ab38d9bb864900a06_1740707152_8205_202x150.png" },
];

/* 썸네일 경로에서 원본(큰) 이미지 경로를 추정 (thumb- 접두어 + _WxH 접미어 제거) */
function guessFullImage(thumbUrl){
  return thumbUrl.replace('/thumb-', '/').replace(/_\d+x\d+(?=\.\w+$)/, '');
}
function boardPostUrl(id){ return `${BOARD_URL}&wr_id=${id}`; }

/* ═══════════════════════════════════════════════════════════
   그리드 렌더 + 카테고리 필터
   ═══════════════════════════════════════════════════════════ */
let currentCat = '전체보기';
function renderChips(){
  const cats = ['전체보기', ...Array.from(new Set(MAPS.map(m=>m.cat)))];
  document.getElementById('cat-chips').innerHTML = cats.map(c=>
    `<button class="cat-chip ${c===currentCat?'on':''}" data-cat="${c}">${c}</button>`
  ).join('');
}
function renderGrid(){
  const list = currentCat === '전체보기' ? MAPS : MAPS.filter(m=>m.cat===currentCat);
  const grid = document.getElementById('map-grid');
  const empty = document.getElementById('empty-state');
  if(list.length===0){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  grid.innerHTML = list.map(m => `
    <div class="map-card" data-id="${m.id}">
      <div class="map-thumb-wrap"><img src="${m.thumb}" alt="${m.title}" loading="lazy"></div>
      <div class="map-card-body">
        <span class="map-card-cat">${m.cat}</span>
        <div class="map-card-title">${m.title}</div>
      </div>
    </div>
  `).join('');
}
document.getElementById('cat-chips').addEventListener('click', e=>{
  const btn = e.target.closest('.cat-chip'); if(!btn) return;
  currentCat = btn.dataset.cat;
  renderChips(); renderGrid();
});
document.getElementById('map-grid').addEventListener('click', e=>{
  const card = e.target.closest('.map-card'); if(!card) return;
  openMapModal(parseInt(card.dataset.id));
});

/* ═══════════════════════════════════════════════════════════
   팝업 뷰어: 위에 썸네일 목록, 아래 큰 이미지
   ═══════════════════════════════════════════════════════════ */
let currentMapId = null;
function renderMvList(){
  document.getElementById('mv-list').innerHTML = MAPS.map(m => `
    <div class="mv-list-item ${m.id===currentMapId?'active':''}" data-id="${m.id}">
      <img src="${m.thumb}" alt="${m.title}">
      <div class="mv-list-item-label">${m.title}</div>
    </div>
  `).join('');
}
function openMapModal(id){
  currentMapId = id;
  renderMvList();
  showMap(id);
  document.getElementById('map-modal').classList.add('open');
}
function closeMapModal(){ document.getElementById('map-modal').classList.remove('open'); }
function showMap(id){
  const m = MAPS.find(x=>x.id===id); if(!m) return;
  currentMapId = id;
  document.getElementById('mv-title').textContent = m.title;
  document.getElementById('mv-cat').textContent = m.cat;
  document.getElementById('mv-orig').href = boardPostUrl(m.id);
  const img = document.getElementById('mv-img');
  img.dataset.triedFull = '0';
  img.src = guessFullImage(m.thumb);
  [...document.querySelectorAll('.mv-list-item')].forEach(el=>{
    el.classList.toggle('active', parseInt(el.dataset.id)===id);
  });
}
/* 추정한 원본 경로가 없으면(로드 실패) 썸네일로 자동 대체 */
function handleImgError(img){
  if(img.dataset.triedFull === '0'){
    img.dataset.triedFull = '1';
    const m = MAPS.find(x=>x.id===currentMapId);
    if(m) img.src = m.thumb;
  }
}
document.getElementById('mv-list').addEventListener('click', e=>{
  const item = e.target.closest('.mv-list-item'); if(!item) return;
  showMap(parseInt(item.dataset.id));
});
document.getElementById('map-modal').addEventListener('click', e=>{
  if(e.target.id === 'map-modal') closeMapModal();
});
document.addEventListener('keydown', e=>{
  if(e.key === 'Escape') closeMapModal();
});

/* 초기 렌더 */
renderChips();
renderGrid();
document.getElementById('sb-map-count').textContent = MAPS.length;
document.getElementById('mapCountFooter').textContent = MAPS.length + '개 지도';
</script>
</body>
</html>
