<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쟈쟈서버 지도정보</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f7fd; --bg2:#e8f2fc; --white:#ffffff;
  --s1:#f0f7fd; --s2:#e3f0fb;
  --border:#dbe9f7; --border2:#bcd8f2;
  --a1:#2f7fd6; --a2:#22b6c9; --a3:#5aa8ea; --a4:#f5a623; --a5:#6fd0a0;
  --t1:#12253f; --t2:#4c6a8c; --t3:#8ea6c2; --t4:#c7dcf0;
  --ok:#3d9e6e; --err:#e05a5a;
  --shadow:0 4px 24px rgba(47,127,214,0.12);
  --shadow2:0 8px 32px rgba(47,127,214,0.18);
}
[data-theme="dark"] {
  --bg:#0a1420; --bg2:#0f1e30; --white:#132335;
  --s1:#16283c; --s2:#1c3149;
  --border:#233c56; --border2:#2c4a68;
  --t1:#e6f0fb; --t2:#a9c2dc; --t3:#7391b0; --t4:#4a637d;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow2:0 8px 32px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--t1); min-height: 100vh;
  background-image:
    radial-gradient(circle 600px at 10% 10%, rgba(47,127,214,0.08) 0%, transparent 100%),
    radial-gradient(circle 700px at 90% 30%, rgba(34,182,201,0.07) 0%, transparent 100%),
    radial-gradient(circle 500px at 50% 90%, rgba(111,208,192,0.08) 0%, transparent 100%);
}
/* ===== 사이드바 ===== */
.sidebar{width:300px;height:100vh;background:var(--white);border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;position:fixed;left:-300px;top:0;z-index:200;
  transition:left .32s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(47,127,214,0.08);}
.sidebar.open{left:0;}
.sb-head{padding:20px 16px 14px;border-bottom:1.5px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;font-weight:900;
  font-size:16px;color:var(--a1);margin-bottom:4px;}
.sb-logo-dot{width:8px;height:8px;background:var(--a2);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(2)}}
.sb-sub{font-size:10.5px;color:var(--t3);font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:.5px;}
.sb-nav{padding:10px 16px;border-bottom:1.5px solid var(--border);}
.sb-nav-toggle{width:100%;display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:13px;
  font-size:13px;font-weight:800;color:var(--t2);background:var(--s1);border:1.5px solid var(--border);
  cursor:pointer;font-family:inherit;transition:border-color .15s;}
.sb-nav-toggle:hover{border-color:var(--a1);}
.sb-nav-toggle-label{flex:1;text-align:left;}
.sb-nav-toggle-chevron{color:var(--t3);font-size:11px;transition:transform .25s;}
.sb-nav-toggle.open .sb-nav-toggle-chevron{transform:rotate(180deg);}
.sb-nav-list{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;gap:5px;}
.sb-nav-list.open{max-height:400px;margin-top:6px;}
.sb-nav-list a{display:flex;align-items:center;gap:9px;text-decoration:none;padding:9px 12px;border-radius:12px;
  font-size:12.5px;font-weight:800;color:var(--t2);background:var(--white);border:1.5px solid var(--border);
  transition:border-color .15s,color .15s;}
.sb-nav-list a:hover{border-color:var(--a1);color:var(--a1);}
.sb-nav-list a.on{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-color:transparent;}
.sb-body{padding:14px 16px 16px;flex:1;overflow-y:auto;min-height:0;font-size:12.5px;color:var(--t2);line-height:1.7;}
.sb-info-box{background:var(--s1);border:1.5px solid var(--border);border-radius:14px;padding:14px;}
.sb-info-box b{color:var(--t1);}
.sb-footer{padding:12px 16px;border-top:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sb-footer-txt{font-size:10.5px;color:var(--t3);}
.toggle-btn{position:fixed;top:16px;left:16px;z-index:300;width:42px;height:42px;background:var(--white);
  border:1.5px solid var(--border);border-radius:12px;color:var(--a1);font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;box-shadow:var(--shadow);}
.toggle-btn:hover{border-color:var(--a1);box-shadow:var(--shadow2);transform:scale(1.05);}
.toggle-btn.sb-open{left:314px;}
@media(max-width:820px){ .toggle-btn.sb-open{left:auto;right:16px;} .main.shifted{margin-left:0;} }
.sb-backdrop{position:fixed;inset:0;background:rgba(12,25,42,0.4);backdrop-filter:blur(2px);
  z-index:190;opacity:0;pointer-events:none;transition:opacity .25s ease;display:none;}
.sb-backdrop.open{opacity:1;pointer-events:auto;}
@media(max-width:820px){ .sb-backdrop{display:block;} }
.dark-toggle{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);background:var(--white);
  cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;transition:all .3s;}
[data-theme="dark"] .toggle-moon{display:inline;} [data-theme="dark"] .toggle-sun{display:none !important;}
[data-theme="light"] .toggle-moon{display:none !important;} [data-theme="light"] .toggle-sun{display:inline;}
.main{flex:1;min-height:100vh;transition:margin-left .32s cubic-bezier(.4,0,.2,1);}
.main.shifted{margin-left:300px;}
.main-inner{max-width:960px;margin:0 auto;padding:70px 20px 80px;}

/* ── header ── */
.page-head { text-align: center; padding: 6px 0 22px; }
.wind-badge { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg,var(--s2),#e0f7fa);
  border: 1.5px solid var(--border2); border-radius: 20px; padding: 6px 14px; font-size: 11px; font-weight: 800;
  font-family: 'Nunito', sans-serif; color: var(--t2); letter-spacing: 1px; margin-bottom: 12px; box-shadow: 0 4px 12px rgba(47,127,214,.12); }
.wind-badge-dot { width: 7px; height: 7px; background: var(--a2); border-radius: 50%; animation: pulse 2s infinite; }
.page-title { font-family: 'Nunito', sans-serif; font-size: 34px; font-weight: 900; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--a1) 0%, var(--a2) 60%, var(--a5) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.15; margin-bottom: 6px; }
.page-sub { font-size: 12px; color: var(--t3); font-family: 'Nunito', sans-serif; font-weight: 700; letter-spacing: 1px; }
.popup-open-btn { margin-top: 14px; padding: 10px 20px; border-radius: 99px; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--a1), var(--a2)); color: #fff; font-size: 12.5px; font-weight: 800;
  font-family: 'Noto Sans KR', sans-serif; box-shadow: 0 4px 16px rgba(47,127,214,.3); transition: transform .15s; }
.popup-open-btn:hover { transform: translateY(-2px); }
.popup-open-btn:active { transform: scale(.97); }

/* ── 검색 ── */
.map-search-wrap{margin-bottom:14px;}
.map-search-input{width:100%;padding:12px 16px;background:var(--white);border:1.5px solid var(--border);
  border-radius:14px;color:var(--t1);font-size:16px;font-family:'Noto Sans KR',sans-serif;
  transition:border-color .18s,box-shadow .18s;box-shadow:var(--shadow);}
.map-search-input:focus{outline:none;border-color:var(--a1);box-shadow:0 0 0 4px rgba(47,127,214,.1);}
.map-search-input::placeholder{color:var(--t4);}

/* ── 카테고리 필터 칩 ── */
.cat-chip-wrap{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:14px;}
.cat-chip{padding:7px 15px;border-radius:99px;font-size:12.5px;font-weight:800;cursor:pointer;
  background:var(--white);border:1.5px solid var(--border);color:var(--t2);transition:all .15s;}
.cat-chip:hover{border-color:var(--a1);color:var(--a1);}
.cat-chip.on{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-color:transparent;}

/* ── 지도 목록 (큰 썸네일 카드 그리드, 항상 보임, 클릭하면 바로 아래 큰 뷰어에 표시) ── */
.map-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:12px;}
.map-row{background:var(--white);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;
  cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;}
.map-row:hover{transform:translateY(-3px);box-shadow:var(--shadow2);border-color:var(--a1);}
.map-row.active{border-color:var(--a1);box-shadow:0 4px 16px rgba(47,127,214,.25);}
.map-row-thumb{width:100%;aspect-ratio:202/150;overflow:hidden;background:var(--s1);}
.map-row-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.map-row-title{font-size:13px;font-weight:800;color:var(--t1);padding:9px 10px 4px;line-height:1.4;}
.map-row.active .map-row-title{color:var(--a1);}
.map-row-cat{display:inline-block;font-size:9.5px;font-weight:900;color:var(--a1);background:var(--s2);
  padding:2px 8px;border-radius:7px;margin:0 10px 9px;letter-spacing:.3px;}

.empty-state{text-align:center;padding:40px 20px;color:var(--t3);}
.load-more-btn{margin:4px 0 16px;padding:9px 24px;border-radius:99px;border:1.5px solid var(--border2);
  background:var(--white);color:var(--t2);font-size:12.5px;font-weight:800;cursor:pointer;transition:all .15s;}
.load-more-btn:hover{border-color:var(--a1);color:var(--a1);}
.empty-state-emoji{font-size:36px;margin-bottom:8px;}

/* ── 큰 뷰어 (같은 화면에 바로 표시, 팝업/모달 없음) ── */
.big-viewer{background:var(--white);border:1.5px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);}
.big-viewer-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1.5px solid var(--border);flex-wrap:wrap;}
.big-viewer-cat{font-size:10.5px;font-weight:900;color:var(--a1);background:var(--s2);padding:3px 10px;border-radius:8px;flex-shrink:0;}
.big-viewer-title{font-size:15px;font-weight:900;color:var(--t1);flex:1;min-width:80px;}
.bv-tools{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.bv-tool-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:var(--s1);
  color:var(--t2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.bv-tool-btn:hover{border-color:var(--a1);color:var(--a1);}
.bv-tool-btn.on{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-color:transparent;}
.bv-zoom-level{font-size:11px;font-weight:800;color:var(--t3);min-width:36px;text-align:center;font-family:'Nunito',sans-serif;}
.big-viewer-body{background:#0d1620;min-height:260px;max-height:70vh;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:12px;position:relative;cursor:grab;}
.big-viewer-body.dragging{cursor:grabbing;}
.big-viewer-body img{max-width:100%;max-height:66vh;object-fit:contain;border-radius:6px;user-select:none;-webkit-user-drag:none;}
.big-viewer-empty{color:#5a7290;text-align:center;font-size:13px;font-weight:700;line-height:1.7;}
.big-viewer-empty-emoji{font-size:36px;display:block;margin-bottom:8px;}

@media(max-width:520px){ .page-title{font-size:26px;} .main-inner{padding:16px 14px 60px;}
  .big-viewer-body{min-height:180px;} .big-viewer-body img{max-height:50vh;} }
</style>
</head>
<body>

<button class="toggle-btn" id="toggleBtn">☰</button>
<div class="sb-backdrop" id="sbBackdrop"></div>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="sb-logo"><span class="sb-logo-dot"></span>SA 쟈쟈</div>
    <div class="sb-sub">JYAJYA SERVER TOOLS</div>
  </div>
  <div class="sb-nav" id="sbNav"></div>
  <div class="sb-body">
    <div class="sb-info-box">
      🗺️ <b>지도정보</b><br><br>
      공홈 지도게시판 1페이지 기준 <b id="sb-map-count">-</b>개 지도를 모아왔어요.<br><br>
      검색창에 초성만 쳐도 찾을 수 있고, 카테고리로 필터링도 가능해요. 클릭하면 바로 아래에 크게 보여요.<br><br>
      <span style="color:var(--t3);">※ 공홈에 지도가 더 올라오면 알려주세요, 추가해드릴게요.</span>
    </div>
  </div>
  <div class="sb-footer">
    <span class="sb-footer-txt" id="mapCountFooter">-개 지도</span>
    <button class="dark-toggle" onclick="toggleDark()"><span class="toggle-moon">🌙</span><span class="toggle-sun">☀️</span></button>
  </div>
</div>

<div class="main" id="main">
<div class="main-inner">

  <div class="page-head">
    <div class="wind-badge"><span class="wind-badge-dot"></span><span>SA JYAJYA · MAP INFO</span></div>
    <h1 class="page-title">🗺️ 지도정보</h1>
    <div class="page-sub">지도를 골라서 크게 확인해보세요</div>
    <button class="popup-open-btn" onclick="openPip().catch(e=>toastMsg('PIP 열기 실패: '+e.message))">📌 PIP로 열기 (게임 위에 항상 띄우기)</button>
  </div>

  <div class="map-search-wrap">
    <input type="text" class="map-search-input" id="map-search" placeholder="지도 검색... (초성 가능, 예: ㄱㅇㄹ)" autocomplete="off">
  </div>

  <div class="cat-chip-wrap" id="cat-chips"></div>

  <div class="map-list" id="map-list"></div>
  <div style="text-align:center;">
    <button class="load-more-btn" id="load-more-btn" style="display:none;">더보기</button>
  </div>
  <div class="empty-state" id="empty-state" style="display:none;">
    <div class="empty-state-emoji">🗺️</div>
    <div>결과가 없어요</div>
  </div>

  <div class="big-viewer" id="big-viewer">
    <div class="big-viewer-head">
      <span class="big-viewer-cat" id="big-cat" style="display:none;">-</span>
      <span class="big-viewer-title" id="big-title">위 목록에서 지도를 선택해주세요</span>
      <div class="bv-tools">
        <button class="bv-tool-btn" id="bv-zoom-out" title="축소 (휠도 가능)">➖</button>
        <span class="bv-zoom-level" id="bv-zoom-level">100%</span>
        <button class="bv-tool-btn" id="bv-zoom-in" title="확대 (휠도 가능)">➕</button>
        <button class="bv-tool-btn" id="bv-zoom-reset" title="원래대로">↺</button>
      </div>
    </div>
    <div class="big-viewer-body" id="big-viewer-body">
      <img id="big-img" alt="지도 이미지" style="display:none;" onerror="handleImgError(this)">
      <div class="big-viewer-empty" id="big-empty"><span class="big-viewer-empty-emoji">🗺️</span>지도를 클릭하면<br>여기에 바로 크게 보여요</div>
    </div>
  </div>

</div>
</div>

<script src="nav.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   사이드바 / 다크모드
   ═══════════════════════════════════════════════════════════ */
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleBtn");
const mainEl = document.getElementById("main");
const sbBackdrop = document.getElementById("sbBackdrop");
function setSidebar(open){
  sidebar.classList.toggle("open", open);
  toggleBtn.classList.toggle("sb-open", open);
  mainEl.classList.toggle("shifted", open);
  sbBackdrop.classList.toggle("open", open);
  toggleBtn.textContent = open ? "✕" : "☰";
  try{ localStorage.setItem('sa2-sb', open ? '1' : '0'); }catch(e){}
}
toggleBtn.addEventListener("click", ()=> setSidebar(!sidebar.classList.contains("open")));
sbBackdrop.addEventListener("click", ()=> setSidebar(false));
try{
  const sbSaved = localStorage.getItem('sa2-sb');
  setSidebar(sbSaved === null ? window.innerWidth > 820 : sbSaved === '1');
}catch(e){ setSidebar(window.innerWidth > 820); }

function toggleDark(){
  const h=document.documentElement;
  const n=h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme', n);
  try{ localStorage.setItem('sa2-theme', n); }catch(e){}
}
try{ const saved=localStorage.getItem('sa2-theme'); if(saved) document.documentElement.setAttribute('data-theme', saved); }catch(e){}

/* ═══════════════════════════════════════════════════════════
   지도 데이터 (공홈 지도게시판 1페이지 기준)
   thumb: 게시판 목록 썸네일 / full: 추정 원본 경로(안되면 자동으로 썸네일로 대체)
   ═══════════════════════════════════════════════════════════ */
const BOARD_URL = "https://sa000001.com/bbs/board.php?bo_table=s2_map";
const MAPS = [
  { id:1,   cat:"사이너스", title:"사이너스 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-feb1d4ced69e4b34dfb3373d9967356b_1782236319_254_202x150.png" },
  { id:99,  cat:"공지",     title:"상점 (구매 위치 정보)", thumb:"https://sa000001.com/data/editor/2502/thumb-77a34ab8117c1c470e546aa6965d0a59_1740647367_5312_202x150.png" },
  { id:98,  cat:"전체지도",     title:"가이아 섬 전체지도", thumb:"https://sa000001.com/data/editor/2502/thumb-a6353f7e848d23c69d24ce879277fec4_1740046840_4651_202x150.png" },
  { id:94,  cat:"전체지도",     title:"에레보스 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-feb1d4ced69e4b34dfb3373d9967356b_1782236308_8428_202x150.png" },
  { id:93,  cat:"전체지도",     title:"하이하모 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-feb1d4ced69e4b34dfb3373d9967356b_1782236295_6378_202x150.png" },
  { id:92,  cat:"전체지도",     title:"포우렌 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-feb1d4ced69e4b34dfb3373d9967356b_1782236279_3602_202x150.png" },
  { id:90,  cat:"전체지도",     title:"가우린 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-7af8735c42d805a8a677d820eeea962f_1782236215_5567_202x150.png" },
  { id:91,  cat:"전체지도",     title:"세르노스 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-7af8735c42d805a8a677d820eeea962f_1782236199_5609_202x150.png" },
  { id:89,  cat:"전체지도",     title:"쟈루 전체지도", thumb:"https://sa000001.com/data/editor/2606/thumb-cd0c9602d6dac7a3078b19f6ae0a40d1_1782236173_974_202x150.png" },
  { id:109, cat:"전체지도",     title:"사냥터", thumb:"https://sa000001.com/data/editor/2606/thumb-d5fab41b3c2cd9c6ad5e5c2d85fecbc8_1782797423_2094_202x150.png" },
  { id:108, cat:"세르노스", title:"포루섬 전체지도", thumb:"https://sa000001.com/data/editor/2503/thumb-d06c3aac20d35e7c94461f6fe7791092_1742750480_0263_202x150.png" },

/* 썸네일 경로에서 원본(큰) 이미지 경로를 추정 (thumb- 접두어 + _WxH 접미어 제거) */
function guessFullImage(thumbUrl){
  return thumbUrl.replace('/thumb-', '/').replace(/_\d+x\d+(?=\.\w+$)/, '');
}

/* 카테고리 표시 순서 (지정된 순서 → 그 외는 뒤에 알파벳/가나다 순) */
const CAT_ORDER = ['사이너스','쟈루','가우린','세르노스','포우렌','하이하모','에레보스','아쿠아펄','가이아','전체지도'];
function sortCats(cats){
  return cats.slice().sort((a,b)=>{
    const ia = CAT_ORDER.indexOf(a), ib = CAT_ORDER.indexOf(b);
    if(ia===-1 && ib===-1) return a.localeCompare(b,'ko');
    if(ia===-1) return 1;
    if(ib===-1) return -1;
    return ia-ib;
  });
}

/* ═══════════════════════════════════════════════════════════
   카테고리 필터 + 썸네일 스트립 + 큰 뷰어 (한 화면, 팝업/이동 없음)
   ═══════════════════════════════════════════════════════════ */
let currentCat = '전체보기';
let currentMapId = null;
let shownCount = 30;

function renderChips(){
  const cats = ['전체보기', ...sortCats(Array.from(new Set(MAPS.filter(m=>m.cat!=='공지').map(m=>m.cat))))];
  document.getElementById('cat-chips').innerHTML = cats.map(c=>
    `<button class="cat-chip ${c===currentCat?'on':''}" data-cat="${c}">${c}</button>`
  ).join('');
}
function renderList(){
  const q = document.getElementById('map-search').value.trim();
  const searching = q.length > 0;
  document.getElementById('cat-chips').style.opacity = searching ? '.4' : '1';
  document.getElementById('cat-chips').style.pointerEvents = searching ? 'none' : 'auto';

  const full = searching ? searchMaps(q) : (currentCat === '전체보기' ? MAPS : MAPS.filter(m=>m.cat===currentCat));
  const list = full.slice(0, shownCount);
  const listEl = document.getElementById('map-list');
  const empty = document.getElementById('empty-state');
  if(full.length===0){ listEl.innerHTML=''; empty.style.display='block'; document.getElementById('load-more-btn').style.display='none'; return; }
  empty.style.display='none';
  listEl.innerHTML = list.map(m => `
    <div class="map-row ${m.id===currentMapId?'active':''}" data-id="${m.id}">
      <div class="map-row-thumb"><img src="${m.thumb}" alt="${m.title}" loading="lazy"></div>
      <div class="map-row-title">${m.title}</div>
      <div class="map-row-cat">${m.cat}</div>
    </div>
  `).join('');
  const moreBtn = document.getElementById('load-more-btn');
  if(full.length > shownCount){
    moreBtn.style.display = 'block';
    moreBtn.textContent = `더보기 (${shownCount}/${full.length})`;
  } else {
    moreBtn.style.display = 'none';
  }
}
let bvZoom = 1;
let bvPanX = 0, bvPanY = 0;
function showMap(id, scrollTo){
  const m = MAPS.find(x=>x.id===id); if(!m) return;
  currentMapId = id;
  bvZoom = 1; bvPanX = 0; bvPanY = 0;
  document.getElementById('big-title').textContent = m.title;
  const catEl = document.getElementById('big-cat');
  catEl.textContent = m.cat; catEl.style.display = 'inline-block';
  document.getElementById('big-empty').style.display = 'none';
  const img = document.getElementById('big-img');
  img.style.display = 'block';
  img.dataset.triedFull = '0';
  img.src = guessFullImage(m.thumb);
  bvApplyZoom();
  [...document.querySelectorAll('.map-row')].forEach(el=>{
    el.classList.toggle('active', parseInt(el.dataset.id)===id);
  });
  if(scrollTo !== false){
    document.getElementById('big-viewer').scrollIntoView({ behavior:'smooth', block:'start' });
  }
}
/* 추정한 원본 경로가 없으면(로드 실패) 썸네일로 자동 대체 */
function handleImgError(img){
  if(img.dataset.triedFull === '0'){
    img.dataset.triedFull = '1';
    const m = MAPS.find(x=>x.id===currentMapId);
    if(m) img.src = m.thumb;
  }
}
/* ── 지도 뷰어: 확대·축소(휠 지원) + 드래그로 이동 ── */
function bvApplyZoom(){
  document.getElementById('big-img').style.transform = `translate(${bvPanX}px, ${bvPanY}px) scale(${bvZoom})`;
  document.getElementById('bv-zoom-level').textContent = Math.round(bvZoom*100) + '%';
}
function bvSetZoom(z){
  bvZoom = Math.max(0.5, Math.min(4, Math.round(z*100)/100));
  if(bvZoom===1){ bvPanX=0; bvPanY=0; }
  bvApplyZoom();
}
document.getElementById('bv-zoom-in').addEventListener('click', ()=> bvSetZoom(bvZoom+0.25));
document.getElementById('bv-zoom-out').addEventListener('click', ()=> bvSetZoom(bvZoom-0.25));
document.getElementById('bv-zoom-reset').addEventListener('click', ()=>{
  bvZoom = 1; bvPanX = 0; bvPanY = 0; bvApplyZoom();
});
{
  const body = document.getElementById('big-viewer-body');
  body.addEventListener('wheel', e=>{
    if(!currentMapId) return;
    e.preventDefault();
    bvSetZoom(bvZoom + (e.deltaY < 0 ? 0.15 : -0.15));
  }, { passive:false });
  let dragging = false, startX=0, startY=0, startPanX=0, startPanY=0;
  body.addEventListener('mousedown', e=>{
    if(!currentMapId || bvZoom<=1) return;
    dragging = true; startX=e.clientX; startY=e.clientY; startPanX=bvPanX; startPanY=bvPanY;
    body.classList.add('dragging');
  });
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    bvPanX = startPanX + (e.clientX-startX);
    bvPanY = startPanY + (e.clientY-startY);
    bvApplyZoom();
  });
  window.addEventListener('mouseup', ()=>{ dragging=false; body.classList.remove('dragging'); });
}
document.getElementById('map-search').addEventListener('input', ()=>{
  shownCount = 30;
  renderList();
});
document.getElementById('cat-chips').addEventListener('click', e=>{
  const btn = e.target.closest('.cat-chip'); if(!btn) return;
  currentCat = btn.dataset.cat;
  shownCount = 30;
  renderChips(); renderList();
  const firstItem = currentCat==='전체보기' ? MAPS[0] : MAPS.find(m=>m.cat===currentCat);
  if(firstItem) showMap(firstItem.id);
});
document.getElementById('map-list').addEventListener('click', e=>{
  const item = e.target.closest('.map-row'); if(!item) return;
  showMap(parseInt(item.dataset.id));
});
document.getElementById('load-more-btn').addEventListener('click', ()=>{
  shownCount += 30;
  renderList();
});

/* ═══════════════════════════════════════════════════════════
   초성 검색 (quiz.html과 동일한 방식)
   ═══════════════════════════════════════════════════════════ */
const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
function toChosung(str){
  let out = '';
  for(const ch of str){
    const code = ch.charCodeAt(0);
    if(code>=0xAC00 && code<=0xD7A3){ out += CHO[Math.floor((code-0xAC00)/588)]; }
    else if(ch !== ' '){ out += ch.toLowerCase(); }
  }
  return out;
}
function isChosungQuery(q){ return /[ㄱ-ㅎ]/.test(q); }
function searchMaps(q){
  q = q.trim(); if(!q) return [];
  if(isChosungQuery(q)){
    const qc = toChosung(q);
    return MAPS.filter(m => toChosung(m.title).includes(qc) || toChosung(m.cat).includes(qc));
  }
  const ql = q.replace(/\s+/g,'').toLowerCase();
  return MAPS.filter(m => m.title.replace(/\s+/g,'').toLowerCase().includes(ql));
}

  }

  doc.getElementById('pip-cat-bar').addEventListener('click', e=>{
    const chip = e.target.closest('.pip-cat-chip'); if(!chip) return;
    pipCurrentCat = chip.dataset.cat;
    doc.getElementById('pip-search').value = '';
    pipRenderCatBar();
    pipShowList();
  });
  doc.getElementById('pip-list-view').addEventListener('click', e=>{
    const item = e.target.closest('.pip-list-item'); if(!item) return;
    pipShowMap(parseInt(item.dataset.id));
  });
  doc.getElementById('pip-list-btn').addEventListener('click', pipShowList);
  doc.getElementById('pip-search').addEventListener('input', pipShowList);

  pipRenderCatBar();
  pipShowList();
}

function toastMsg(msg){
  let el = document.getElementById('_toast_el');
  if(!el){
    el = document.createElement('div'); el.id = '_toast_el';
    el.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
      background:linear-gradient(135deg,#12253f,#2f7fd6);color:#fff;padding:12px 22px;border-radius:99px;
      font-size:13px;font-weight:800;font-family:'Noto Sans KR',sans-serif;text-align:center;max-width:88vw;
      box-shadow:0 8px 28px rgba(0,0,0,.25);z-index:99999;opacity:0;pointer-events:none;
      transition:opacity .2s,transform .2s;`;
    document.body.appendChild(el);
  }
  el.textContent = msg;
  requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)'; });
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(20px)'; }, 2200);
}

/* 초기 렌더 */
renderChips();
renderList();
document.getElementById('sb-map-count').textContent = MAPS.length;
document.getElementById('mapCountFooter').textContent = MAPS.length + '개 지도';
</script>
