<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쟈쟈서버 아이템도감</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f7fd; --bg2:#e8f2fc; --white:#ffffff;
  --s1:#f0f7fd; --s2:#e3f0fb;
  --border:#dbe9f7; --border2:#bcd8f2;
  --a1:#2f7fd6; --a2:#22b6c9; --a3:#5aa8ea; --a4:#f5a623; --a5:#6fd0a0;
  --t1:#12253f; --t2:#4c6a8c; --t3:#8ea6c2; --t4:#c7dcf0;
  --ok:#3d9e6e; --err:#e05a5a; --pos:#2f7fd6; --neg:#e05a5a;
  --shadow:0 4px 24px rgba(47,127,214,0.12);
  --shadow2:0 8px 32px rgba(47,127,214,0.18);
}
[data-theme="dark"] {
  --bg:#0a1420; --bg2:#0f1e30; --white:#132335;
  --s1:#16283c; --s2:#1c3149;
  --border:#233c56; --border2:#2c4a68;
  --t1:#e6f0fb; --t2:#a9c2dc; --t3:#7391b0; --t4:#4a637d;
  --pos:#5aa8ea; --neg:#f08a8a;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow2:0 8px 32px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;
  background-image:radial-gradient(circle at 12% 8%, rgba(47,127,214,0.08) 0%, transparent 50%),
    radial-gradient(circle at 88% 90%, rgba(34,182,201,0.07) 0%, transparent 50%);}

/* ===== 사이드바 ===== */
.sidebar{width:300px;height:100vh;background:var(--white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;left:-300px;top:0;z-index:200;
  transition:left .32s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(47,127,214,0.08);}
.sidebar.open{left:0;}
.sb-head{padding:20px 16px 15px;border-bottom:1px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;font-weight:900;
  font-size:16px;color:var(--a1);margin-bottom:4px;}
.sb-logo-dot{width:8px;height:8px;background:var(--a2);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(2)}}
.sb-sub{font-size:10.5px;color:var(--t3);font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:.5px;}
.sb-nav{padding:11px 14px;border-bottom:1px solid var(--border);}
.sb-nav-toggle{width:100%;display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;
  font-size:13px;font-weight:800;color:var(--t1);background:var(--s1);border:none;
  cursor:pointer;font-family:inherit;transition:background .18s;}
.sb-nav-toggle:hover{background:var(--s2);}
.sb-nav-toggle-label{flex:1;text-align:left;}
.sb-nav-toggle-chevron{color:var(--t3);font-size:11px;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.sb-nav-toggle.open .sb-nav-toggle-chevron{transform:rotate(180deg);}
.sb-nav-list{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.33,1,.68,1);
  display:flex;flex-direction:column;gap:2px;perspective:700px;}
.sb-nav-list.open{max-height:520px;margin-top:5px;padding-top:2px;}
.sb-nav-list a{display:flex;align-items:center;gap:10px;text-decoration:none;padding:10px 13px;border-radius:10px;
  font-size:12.5px;font-weight:700;color:var(--t2);background:transparent;border:none;
  opacity:0;transform:rotateX(-82deg);transform-origin:center top;
  transition:opacity .26s ease,transform .5s cubic-bezier(.34,1.32,.5,1),background .16s ease,color .16s ease;}
.sb-nav-list.open a{opacity:1;transform:rotateX(0);}
.sb-nav-list.open a:nth-child(1){transition-delay:.02s;}
.sb-nav-list.open a:nth-child(2){transition-delay:.07s;}
.sb-nav-list.open a:nth-child(3){transition-delay:.12s;}
.sb-nav-list.open a:nth-child(4){transition-delay:.17s;}
.sb-nav-list.open a:nth-child(5){transition-delay:.22s;}
.sb-nav-list.open a:nth-child(6){transition-delay:.27s;}
.sb-nav-list.open a:nth-child(7){transition-delay:.32s;}
.sb-nav-list.open a:nth-child(8){transition-delay:.37s;}
.sb-nav-list a:hover{background:var(--s1);color:var(--a1);}
.sb-nav-list a.on{background:rgba(47,127,214,.12);color:var(--a1);font-weight:800;}
[data-theme="dark"] .sb-nav-list a.on{background:rgba(90,168,234,.16);}
@media(prefers-reduced-motion:reduce){
  .sb-nav-list a{transition:background .16s ease,color .16s ease;transform:none;opacity:1;}
  .sb-nav-list.open a{transition-delay:0s;}
}

.sb-body{padding:16px 16px 16px;flex:1;overflow-y:auto;min-height:0;}
.sb-body::-webkit-scrollbar{width:4px;} .sb-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.f-group{margin-bottom:18px;}
.f-group:last-child{margin-bottom:0;}
.f-section{font-size:10px;letter-spacing:1.2px;color:var(--t3);text-transform:uppercase;margin:0 0 8px 2px;
  font-family:'Nunito',sans-serif;font-weight:800;}
.f-input,.f-select{width:100%;padding:10px 13px;background:var(--s1);border:1px solid var(--border);
  border-radius:11px;font-family:inherit;font-size:16px;color:var(--t1);outline:none;transition:border-color .15s,background .15s;}
.f-input::placeholder{color:var(--t3);}
.f-input:focus,.f-select:focus{border-color:var(--a1);background:var(--white);}
.f-chip-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.f-chip{background:var(--white);border:1px solid var(--border);color:var(--t2);padding:6px 11px;
  border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;transition:border-color .15s,color .15s,background .15s;}
.f-chip:hover{border-color:var(--a3);color:var(--a1);}
.f-chip.is-on{background:var(--a1);border-color:var(--a1);color:#fff;}
.f-chip .cnt{font-family:'Nunito',sans-serif;font-weight:800;opacity:.65;margin-left:4px;font-size:10.5px;}
.f-subwrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding:11px;background:var(--s1);border-radius:11px;}
.f-subchip{background:var(--white);border:1px solid var(--border);color:var(--t2);padding:5px 10px;
  border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;
  transition:border-color .15s,color .15s,background .15s;}
.f-subchip:hover{border-color:var(--a3);color:var(--a1);}
.f-subchip.is-on{background:var(--catcolor,var(--a1));border-color:transparent;color:#fff;}
.f-subchip .cnt{font-family:'Nunito',sans-serif;font-weight:800;opacity:.65;font-size:10px;}
.f-seg{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.f-seg3{grid-template-columns:1fr 1fr 1fr;}
.f-seg button{background:var(--white);border:1px solid var(--border);color:var(--t2);padding:9px 4px;
  border-radius:11px;font-size:12px;cursor:pointer;font-weight:700;font-family:inherit;transition:border-color .15s,color .15s,background .15s;}
.f-seg button:hover{border-color:var(--a3);color:var(--a1);}
.f-seg button.active{background:var(--a1);color:#fff;border-color:var(--a1);}

.sb-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sb-footer-txt{font-size:10.5px;color:var(--t3);}
.dark-toggle{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--s1);
  cursor:pointer;font-size:14px;transition:border-color .15s,background .15s;}
.dark-toggle:hover{border-color:var(--a3);background:var(--white);}
[data-theme="dark"] .toggle-moon{display:inline;} [data-theme="dark"] .toggle-sun{display:none !important;}
[data-theme="light"] .toggle-moon{display:none !important;} [data-theme="light"] .toggle-sun{display:inline;}

.toggle-btn{position:fixed;top:16px;left:16px;z-index:300;width:42px;height:42px;background:var(--white);
  border:1.5px solid var(--border);border-radius:13px;cursor:pointer;font-size:17px;color:var(--t2);
  box-shadow:var(--shadow);transition:left .32s cubic-bezier(.4,0,.2,1),border-color .15s,transform .15s;}
.toggle-btn:hover{border-color:var(--a1);box-shadow:var(--shadow2);transform:scale(1.05);}
.toggle-btn.sb-open{left:314px;}
@media(max-width:820px){ .toggle-btn.sb-open{left:auto;right:16px;} .main.shifted{margin-left:0;} }
.sb-backdrop{position:fixed;inset:0;background:rgba(18,37,63,.35);z-index:150;opacity:0;pointer-events:none;transition:opacity .3s;}
.sb-backdrop.show{opacity:1;pointer-events:auto;}

/* ===== 메인 ===== */
.main{flex:1;min-height:100vh;transition:margin-left .32s cubic-bezier(.4,0,.2,1);}
.main.shifted{margin-left:300px;}
.main-inner{max-width:1240px;margin:0 auto;padding:74px 26px 90px;}
.page-head{text-align:center;padding:8px 0 30px;}
.wind-badge{display:inline-flex;align-items:center;gap:7px;background:var(--white);border:1px solid var(--border2);
  border-radius:20px;padding:6px 15px;font-size:10.5px;font-weight:800;color:var(--a1);
  font-family:'Nunito',sans-serif;letter-spacing:.6px;margin-bottom:15px;box-shadow:0 2px 12px rgba(47,127,214,.08);}
.wind-badge-dot{width:6px;height:6px;background:var(--a2);border-radius:50%;animation:pulse 2s infinite;}
.page-title{font-size:40px;font-weight:900;letter-spacing:-1.4px;line-height:1.05;color:var(--a1);
  background:linear-gradient(115deg,var(--a1),var(--a2) 55%,var(--a3));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.page-sub{font-size:13px;color:var(--t3);margin-top:9px;font-weight:600;}
.stats-row{display:flex;gap:10px;justify-content:center;margin-bottom:26px;flex-wrap:wrap;}
.stat-chip{display:inline-flex;align-items:baseline;gap:5px;font-size:11.5px;color:var(--t3);
  font-family:'Nunito',sans-serif;font-weight:700;background:var(--white);border:1px solid var(--border);
  padding:7px 14px;border-radius:12px;box-shadow:0 1px 4px rgba(47,127,214,.05);}
.stat-chip b{color:var(--a1);font-size:15px;font-weight:900;}

@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(262px,1fr));gap:16px;}
.item-card{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:18px 19px 16px;
  cursor:pointer;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(47,127,214,0.05);
  display:flex;flex-direction:column;
  transition:box-shadow .28s cubic-bezier(.22,1,.36,1),transform .28s cubic-bezier(.22,1,.36,1),border-color .25s;
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;animation-delay:calc(min(var(--i,0),16) * 34ms);}
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cc);
  transform:scaleY(.7);transform-origin:center;transition:transform .28s cubic-bezier(.22,1,.36,1);}
.item-card:hover{transform:translateY(-6px);border-color:var(--border2);box-shadow:0 16px 34px rgba(47,127,214,.16);
  border-color:color-mix(in srgb,var(--cc) 42%,var(--border));box-shadow:0 16px 34px color-mix(in srgb,var(--cc) 20%,transparent);}
.item-card:hover::before{transform:scaleY(1);}
.item-card:active{transform:translateY(-2px);}
.ic-top{display:flex;gap:13px;align-items:center;margin-bottom:15px;}
.ic-img{width:54px;height:54px;flex-shrink:0;border-radius:14px;overflow:hidden;
  background:linear-gradient(145deg,var(--s1),var(--s2));display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 0 1px var(--border);}
.ic-img img{width:82%;height:82%;object-fit:contain;image-rendering:pixelated;transition:transform .3s cubic-bezier(.22,1,.36,1);}
.item-card:hover .ic-img img{transform:scale(1.13);}
.ic-head{min-width:0;flex:1;}
.ic-name{font-size:15.5px;font-weight:800;color:var(--t1);line-height:1.28;word-break:break-all;margin-bottom:4px;}
.ic-type-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ic-type{font-size:11.5px;color:var(--t3);font-weight:700;letter-spacing:.2px;}
.ic-total{flex-shrink:0;display:inline-flex;align-items:baseline;gap:5px;font-family:'Nunito',sans-serif;}
.ic-total .l{font-size:10px;color:var(--t3);font-weight:700;}
.ic-total b{font-size:18px;font-weight:900;letter-spacing:-.5px;}
.ic-total b.pos{color:var(--a1);} .ic-total b.neg{color:var(--neg);} .ic-total b.zero{color:var(--t3);}
.ic-stats{display:flex;flex-wrap:wrap;gap:9px 18px;padding:13px 0;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:13px;}
.ic-stats .st{display:inline-flex;align-items:baseline;gap:6px;font-family:'Nunito',sans-serif;}
.ic-stats .st i{font-style:normal;font-size:11px;color:var(--t3);font-weight:700;}
.ic-stats .st b{font-size:15.5px;font-weight:800;letter-spacing:-.3px;}
.ic-stats .st b.pos{color:var(--t1);} .ic-stats .st b.neg{color:var(--neg);} .ic-stats .st b.zero{color:var(--t4);}
.ic-desc{font-size:12px;color:var(--t2);background:var(--s1);border-radius:10px;padding:10px 12px;margin-bottom:13px;line-height:1.55;}
.ic-meta{display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:11px;}
.ic-meta .m{font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;}
.ic-meta .m.hit{color:var(--t2);} .ic-meta .m.set{color:var(--a4);} .ic-meta .m.magic{color:var(--a2);}
.ic-route{font-size:11px;color:var(--t3);line-height:1.5;overflow:hidden;margin-top:auto;padding-top:2px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
@media(prefers-reduced-motion:reduce){ .item-card{animation:none;} }

/* ===== 3D 덱(커버플로우) — 풀 상세가 흘러감 ===== */
.deck{position:relative;height:600px;margin-top:8px;perspective:1900px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;user-select:none;}
.deck-stage{position:relative;width:100%;height:100%;transform-style:preserve-3d;touch-action:pan-y;}
.deck-card{position:absolute;left:50%;top:50%;width:360px;height:540px;margin-left:-180px;margin-top:-270px;
  transition:transform .55s cubic-bezier(.25,1,.4,1),opacity .45s ease;
  will-change:transform,opacity;}
.dcard{width:100%;height:100%;background:var(--white);border:1px solid var(--border);border-radius:22px;
  overflow:hidden;display:flex;flex-direction:column;box-shadow:0 6px 20px rgba(47,127,214,.1);}
.deck-card.is-center .dcard{box-shadow:0 24px 55px rgba(47,127,214,.28);border-color:var(--border2);}
[data-theme="dark"] .deck-card.is-center .dcard{box-shadow:0 24px 60px rgba(0,0,0,.6);}
.deck-card:not(.is-center) .dcard{filter:saturate(.94);}
.deck-card:not(.is-center){cursor:pointer;}
.dcard .modal-hero{border-radius:22px 22px 0 0;padding:22px 22px 18px;flex-shrink:0;}
.dcard .modal-body{padding:18px 22px 22px;overflow-y:auto;flex:1;}
.dcard .modal-body::-webkit-scrollbar{width:4px;} .dcard .modal-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.dcard .modal-name{font-size:19px;}
.deck-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:200;width:46px;height:46px;border-radius:50%;
  background:var(--white);border:1px solid var(--border);color:var(--a1);font-size:22px;line-height:1;cursor:pointer;
  box-shadow:0 6px 20px rgba(47,127,214,.18);display:flex;align-items:center;justify-content:center;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),background .18s,color .18s;padding-bottom:2px;}
.deck-nav:hover{background:var(--a1);color:#fff;transform:translateY(-50%) scale(1.1);}
.deck-nav:active{transform:translateY(-50%) scale(.94);}
.deck-nav.prev{left:8px;} .deck-nav.next{right:8px;}
.deck-count{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);z-index:200;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;color:var(--t2);
  background:var(--white);border:1px solid var(--border);border-radius:20px;padding:5px 16px;box-shadow:0 2px 10px rgba(47,127,214,.1);}
.deck-count b{color:var(--a1);}
.deck-hint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);z-index:200;
  font-size:10.5px;color:var(--t3);white-space:nowrap;}
@media(max-width:640px){
  .deck{height:560px;perspective:1300px;}
  .deck-card{width:290px;height:500px;margin-left:-145px;margin-top:-250px;}
  .dcard .modal-name{font-size:17px;}
  .deck-hint{display:none;}
}

/* 텍스트형 */
#grid.text-view{display:block;}
.item-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--white);
  border:1.5px solid var(--border);border-radius:16px;box-shadow:0 4px 16px rgba(47,127,214,0.06);}
.item-table thead tr{background:var(--s1);}
.item-table th{padding:11px 12px;text-align:left;font-size:12.5px;font-weight:800;color:var(--t2);
  border-bottom:1.5px solid var(--border);white-space:nowrap;background:var(--s1);
  position:sticky;top:0;z-index:3;}
.item-table th.grp{text-align:center;font-size:9.5px;letter-spacing:2px;color:var(--t3);
  text-transform:uppercase;font-family:'Nunito',sans-serif;font-weight:800;padding:8px 12px 5px;border-bottom:1px solid var(--border);}
.item-table th.sub{padding:5px 12px 9px;font-size:12px;top:var(--h1,33px);z-index:2;}
.item-table th.grp.sp{background:linear-gradient(rgba(34,182,201,.13),rgba(34,182,201,.13)),var(--s1);color:var(--a2);}
.item-table th.sub.sp{background:linear-gradient(rgba(34,182,201,.07),rgba(34,182,201,.07)),var(--s1);}
.item-table td.sp{background:rgba(34,182,201,.055);}
[data-theme="dark"] .item-table td.sp{background:rgba(34,182,201,.1);}
.item-table td{padding:11px 12px;font-size:14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.item-table tbody tr{cursor:pointer;transition:background .15s;}
.item-table tbody tr:hover{background:var(--s1);}
.item-table tbody tr:last-child td{border-bottom:none;}
.it-name{font-size:14.5px;font-weight:800;color:var(--t1);}
.it-cat{font-size:11px;font-weight:800;padding:2px 8px;border-radius:8px;color:#fff;white-space:nowrap;}
.it-route{font-size:12px;color:var(--t3);margin-top:2px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.it-stat{font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;text-align:right;white-space:nowrap;}
.it-stat.pos{color:var(--pos);} .it-stat.neg{color:var(--neg);} .it-stat.zero{color:var(--t4);}
.it-total{font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;text-align:right;white-space:nowrap;}
.it-total.pos{color:var(--a1);} .it-total.neg{color:var(--neg);} .it-total.zero{color:var(--t4);}
.item-table th.r,.item-table td.r{text-align:right;}
@media(max-width:900px){ .item-table{display:block;overflow-x:auto;} }

#empty{text-align:center;padding:60px 20px;color:var(--t3);display:none;}
#empty .glyph{font-size:34px;margin-bottom:10px;opacity:.4;}
#loadmore{display:block;margin:24px auto 0;background:var(--white);border:1.5px solid var(--a1);
  color:var(--a1);padding:11px 28px;border-radius:20px;font-size:13px;font-weight:800;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .2s ease,color .2s ease;}
#loadmore:hover{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-color:transparent;transform:translateY(-2px) scale(1.03);}
#loadmore:active{transform:scale(.95);}

@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
#item-modal{position:fixed;inset:0;background:rgba(18,37,63,0.45);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:2000;padding:20px;}
#item-modal.open{display:flex;}
.modal-card{background:var(--white);border-radius:24px;box-shadow:0 20px 60px rgba(47,127,214,0.25);
  width:100%;max-width:460px;max-height:90vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);position:relative;}
.modal-card::-webkit-scrollbar{width:4px;} .modal-card::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;
  background:var(--s2);border:none;cursor:pointer;font-size:14px;color:var(--t2);transition:all .15s;
  display:flex;align-items:center;justify-content:center;z-index:2;}
.modal-close:hover{background:var(--err);color:#fff;}
.modal-hero{background:linear-gradient(135deg,var(--s1),var(--s2));border-radius:24px 24px 0 0;
  padding:26px 24px 20px;display:flex;align-items:center;gap:18px;border-bottom:1.5px solid var(--border);}
.modal-img-box{width:84px;height:84px;flex-shrink:0;background:var(--white);border:2px solid var(--border2);
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(47,127,214,0.15);overflow:hidden;}
.modal-img-box img{width:78%;height:78%;object-fit:contain;image-rendering:pixelated;}
.modal-hero-info{flex:1;min-width:0;}
.modal-name{font-size:21px;font-weight:900;color:var(--t1);margin-bottom:7px;line-height:1.2;word-break:break-all;}
.modal-badges{display:flex;gap:5px;flex-wrap:wrap;}
.modal-badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;color:#fff;}
.modal-badge.set{color:var(--a4);background:rgba(245,166,35,.14);border:1px solid rgba(245,166,35,.35);}
.modal-body{padding:20px 24px 24px;}
.modal-section{margin-bottom:16px;}
.modal-section:last-child{margin-bottom:0;}
.modal-section-title{font-size:9px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;
  font-family:'Nunito',sans-serif;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.modal-section-title::before{content:'';display:block;width:3px;height:12px;
  background:linear-gradient(135deg,var(--a1),var(--a2));border-radius:2px;}
.modal-obtain{font-size:13px;color:var(--t2);line-height:1.6;background:var(--s1);
  border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;word-break:break-all;}
.modal-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.modal-stat-box{background:var(--s1);border:1.5px solid var(--border);border-radius:12px;
  padding:9px 13px;display:flex;flex-direction:column;gap:2px;}
.modal-stat-label{font-size:9px;letter-spacing:1px;color:var(--t3);font-family:'Nunito',sans-serif;
  font-weight:700;text-transform:uppercase;}
.modal-stat-val{font-size:17px;font-weight:900;font-family:'Nunito',sans-serif;color:var(--t1);}
.modal-stat-val.pos{color:var(--pos);} .modal-stat-val.neg{color:var(--neg);}
.modal-total{margin-top:10px;padding:11px 15px;background:linear-gradient(135deg,var(--s2),var(--s1));
  border:1.5px solid var(--border2);border-radius:12px;display:flex;align-items:center;justify-content:space-between;}
.modal-total .l{font-size:11px;font-weight:800;color:var(--t2);}
.modal-total .v{font-size:20px;font-weight:900;font-family:'Nunito',sans-serif;}
.modal-total .v.pos{color:var(--a1);} .modal-total .v.neg{color:var(--neg);} .modal-total .v.zero{color:var(--t3);}
.modal-desc{font-size:13px;color:var(--t2);line-height:1.6;background:var(--s1);border:1.5px solid var(--border);
  border-radius:10px;padding:10px 14px;}
.modal-magic{display:flex;gap:10px;flex-wrap:wrap;}
.modal-magic-box{flex:1;min-width:120px;background:linear-gradient(135deg,var(--s2),var(--s1));
  border:1.5px solid var(--border2);border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;gap:3px;}
.modal-magic-box .l{font-size:9px;letter-spacing:1px;color:var(--t3);font-weight:800;font-family:'Nunito',sans-serif;text-transform:uppercase;}
.modal-magic-box .v{font-size:14px;font-weight:900;color:var(--a2);}

footer{text-align:center;padding:30px;color:var(--t3);font-size:11px;font-family:'Nunito',sans-serif;}
@media(max-width:640px){
  .page-title{font-size:30px;letter-spacing:-1px;}
  #grid{grid-template-columns:1fr;gap:13px;}
  .main-inner{padding:66px 16px 70px;}
  .item-card{padding:16px 17px 15px;}
}
@media(min-width:641px) and (max-width:900px){
  #grid{grid-template-columns:repeat(2,1fr);}
}

function itemSubtype(it){
  var p=it.part, n=it.name;
  if(it.cat==='무기'){
    if(p===0) return '손톱'; if(p===1) return '도끼'; if(p===2) return '곤봉';
    if(p===3) return '창'; if(p===4) return '활'; if(p===17) return '부메랑';
    return '기타무기';
  }
  if(it.cat==='방어구'){ if(p===6) return '투구'; if(p===7) return '갑옷'; return '기타방어구'; }
  if(it.cat==='장신구'){
    if(n.indexOf('목걸이')>=0||n.indexOf('팬던트')>=0||n.indexOf('펜던트')>=0) return '목걸이';
    if(n.indexOf('반지')>=0) return '반지';
    if(n.indexOf('귀걸이')>=0) return '귀걸이';
    if(n.indexOf('팔찌')>=0) return '팔찌';
    if(n.indexOf('거울')>=0) return '거울';
    return '기타장신구';
  }
  return '';
}

function byId(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function trim(s){ return String(s==null?'':s).replace(/^\s+|\s+$/g,''); }
function norm(s){ s=String(s==null?'':s).toLowerCase(); s=s.replace(/\s+/g,''); s=s.replace(/[^\w가-힣]/g,''); return s; }
function isEmptyVal(v){ v=trim(v); return v===''||v==='-'||v==='0'||v==='+0'||v==='-0'; }

function statRange(min,max){
  var a=trim(min), b=trim(max);
  var am=a.match(/-?\d+/), bm=b.match(/-?\d+/);
  a = am?am[0]:'-'; b = bm?bm[0]:'-';
  var ae=isEmptyVal(a), be=isEmptyVal(b);
  if(ae&&be) return '-';
  if(ae&&!be) return b.replace(/^\+/,'');
  if(be&&!ae) return a.replace(/^\+/,'');
  a=a.replace(/^\+/,''); b=b.replace(/^\+/,'');
  if(a===b) return a;
  return a+'~'+b;
}
function statNum(v){ var m=String(v).match(/-?\d+/); return m?parseInt(m[0],10):0; }
function rangeNum(min,max){ if(!isEmptyVal(max)) return statNum(max); return statNum(min); }
function valClass(txt){ if(txt==='-') return 'zero'; return String(txt).charAt(0)==='-'?'neg':'pos'; }

/* 아이템의 표시 가능한 스탯 목록 [label, rangeText] (값 있는 것만) */
var STAT_DEFS = [
  ['공','minAtk','maxAtk'],['방','minDef','maxDef'],['순','minDex','maxDex'],['내','minHP','maxHP'],
  ['크리','minCrit','maxCrit'],['회피','minEva','maxEva'],['명중','hit','hit'],['매력','minCharm','maxCharm']
];
function itemStats(it){
  var out=[];
  for(var i=0;i<STAT_DEFS.length;i++){
    var d=STAT_DEFS[i];
    var r=statRange(it[d[1]], it[d[2]]);
    if(r!=='-') out.push([d[0], r]);
  }
  return out;
}
function sortValue(it,key){
  if(key==='total') return itemTotal(it);
  var m={atk:['minAtk','maxAtk'],def:['minDef','maxDef'],dex:['minDex','maxDex'],hp:['minHP','maxHP'],
    crit:['minCrit','maxCrit'],eva:['minEva','maxEva'],hit:['hit','hit'],charm:['minCharm','maxCharm']};
  var d=m[key]; if(!d) return 0; return rangeNum(it[d[0]], it[d[1]]);
}

/* 합계 스탯: +는 최고치, -는 최소페널티(둘 다 max값) · 내구력은 3당 1로 환산(÷3) */
function itemTotal(it){
  return rangeNum(it.minAtk,it.maxAtk)+rangeNum(it.minDef,it.maxDef)+rangeNum(it.minDex,it.maxDex)+rangeNum(it.minHP,it.maxHP)/3;
}
function hasBaseStat(it){
  return statRange(it.minAtk,it.maxAtk)!=='-'||statRange(it.minDef,it.maxDef)!=='-'||
         statRange(it.minDex,it.maxDex)!=='-'||statRange(it.minHP,it.maxHP)!=='-';
}
function fmtTotal(v){
  var r=Math.round(v*100)/100;
  var s=String(r);
  return (r>0?'+':'')+s;
}
function totalClass(v){ return v>0?'pos':(v<0?'neg':'zero'); }

function iconUrl(it){
  var key=trim(it.gfx); if(key===''||key==='0') key=trim(it.id); if(key==='') return ICON_DEFAULT;
  return ICON_BASE+key+'.png';
}
function imgTag(it){
  return '<img src="'+esc(iconUrl(it))+'" loading="lazy" alt="" onerror="this.onerror=null;this.src=\''+ICON_DEFAULT+'\'">';
}

function hasMagic(it){ return it.magicName && it.magicName!=='주술없음' && !isEmptyVal(it.stamina); }

  var sub = itemSubtype(it);
  var typeLabel = it.cat + (sub ? ' · ' + sub : '');

  /* 스탯 인라인 */
  var statHtml;
  if(stats.length){
    statHtml='<div class="ic-stats">'+stats.map(function(s){
      return '<span class="st"><i>'+esc(s[0])+'</i><b class="'+valClass(s[1])+'">'+esc(s[1])+'</b></span>';
    }).join('')+'</div>';
  }else{
    var d=trim(it.desc);
    var body=(d && d!=='미확인') ? esc(d) : '옵션 정보 없음';
    statHtml='<div class="ic-desc">'+body+'</div>';
  }

  /* 합계 (타입 줄 우측) */
  var totalHtml='';
  if(hasBaseStat(it)){
    var tv=itemTotal(it);
    totalHtml='<span class="ic-total"><span class="l">합계</span><b class="'+totalClass(tv)+'">'+esc(fmtTotal(tv))+'</b></span>';
  }

  /* 메타 라인: 타수 / 세트 / 주술 (있는 것만) */
  var meta=[];
  if(it.cat==='무기'){ var h=statRange(it.minHit,it.maxHit); if(h!=='-') meta.push('<span class="m hit">⚔ '+esc(h)+'타</span>'); }
  if(it.setEff) meta.push('<span class="m set">✦ '+esc(it.setEff)+'</span>');
  if(hasMagic(it)) meta.push('<span class="m magic">🔮 '+esc(it.magicName)+'</span>');
  var metaHtml = meta.length ? '<div class="ic-meta">'+meta.join('')+'</div>' : '';

  var route = it.route ? esc(it.route) : '미등록';
  return '<article class="item-card" style="--cc:'+color+';--i:'+(pos||0)+'" data-idx="'+idx+'">'+
      '<div class="ic-top">'+
        '<div class="ic-img">'+imgTag(it)+'</div>'+
        '<div class="ic-head">'+
          '<div class="ic-name">'+esc(it.name)+'</div>'+
          '<div class="ic-type-row"><span class="ic-type">'+esc(typeLabel)+'</span>'+totalHtml+'</div>'+
        '</div>'+
      '</div>'+
      statHtml+
      metaHtml+
      '<div class="ic-route">'+route+'</div>'+
    '</article>';
}

/* ===== 텍스트형 표 ===== */
function tableHTML(list){
  var head='<thead>'+
    '<tr>'+
      '<th rowspan="2">아이템</th><th rowspan="2">분류</th>'+
      '<th class="r grp" colspan="4">기본옵션</th>'+
      '<th class="r" rowspan="2">합계</th>'+
      '<th class="r grp sp" colspan="3">특수</th>'+
      '<th rowspan="2">주술</th>'+
    '</tr>'+
    '<tr>'+
      '<th class="r sub">공</th><th class="r sub">방</th><th class="r sub">순</th><th class="r sub">내</th>'+
      '<th class="r sub sp">크리</th><th class="r sub sp">명중</th><th class="r sub sp">회피</th>'+
    '</tr>'+
  '</thead>';
  var rows=list.map(function(it){
    var idx=ITEMS.indexOf(it);
    var color=CAT_COLOR[it.cat]||CAT_COLOR['기타'];
    function cell(min,max,extra){ var r=statRange(min,max); return '<td class="r'+(extra||'')+'"><span class="it-stat '+valClass(r)+'">'+esc(r)+'</span></td>'; }
    var totalCell;
    if(hasBaseStat(it)){ var tv=itemTotal(it); totalCell='<td class="r"><span class="it-total '+totalClass(tv)+'">'+esc(fmtTotal(tv))+'</span></td>'; }
    else totalCell='<td class="r"><span class="it-stat zero">-</span></td>';
    var mg = hasMagic(it)? esc(it.magicName) : '<span style="color:var(--t4)">-</span>';
    return '<tr data-idx="'+idx+'">'+
      '<td><div class="it-name">'+esc(it.name)+'</div><div class="it-route">'+esc(it.route||'미등록')+'</div></td>'+
      '<td><span class="it-cat" style="background:'+color+'">'+esc(it.cat)+'</span></td>'+
      cell(it.minAtk,it.maxAtk)+cell(it.minDef,it.maxDef)+cell(it.minDex,it.maxDex)+cell(it.minHP,it.maxHP)+
      totalCell+
      cell(it.minCrit,it.maxCrit,' sp')+cell(it.hit,it.hit,' sp')+cell(it.minEva,it.maxEva,' sp')+

    '</tr>';
  }).join('');
  return '<table class="item-table">'+head+'<tbody>'+rows+'</tbody></table>';
}

/* ===== 필터/정렬 ===== */
function applyFilter(){
  var arr=ITEMS.slice();
  if(CAT!=='전체') arr=arr.filter(function(i){ return i.cat===CAT; });
  if(SUBCATS[CAT] && SUBCAT!=='전체') arr=arr.filter(function(i){ return itemSubtype(i)===SUBCAT; });
  if(MAGIC!=='전체'){
    if(MAGIC==='__has__') arr=arr.filter(function(i){ return hasMagic(i); });
    else arr=arr.filter(function(i){ return i.magicName===MAGIC; });
  }
  var q=norm(QUERY);
  if(q){
    arr=arr.filter(function(i){ return norm(i.name).indexOf(q)>=0 || norm(i.desc).indexOf(q)>=0; });
  }
  if(SORT==='name'){ arr.sort(function(a,b){ return a.name.localeCompare(b.name,'ko'); }); }
  else if(SORT!=='default'){
    arr.sort(function(a,b){ var av=sortValue(a,SORT), bv=sortValue(b,SORT); if(bv!==av) return bv-av; return (a.o||0)-(b.o||0); });
  } else { arr.sort(function(a,b){ return (a.o||0)-(b.o||0); }); }
  return arr;
}

function buildCatChips(){
  var counts={'전체':ITEMS.length};
  for(var i=0;i<ITEMS.length;i++){ var c=ITEMS[i].cat; counts[c]=(counts[c]||0)+1; }
  var html='';
  for(var j=0;j<CAT_ORDER.length;j++){
    var k=CAT_ORDER[j]; var n=counts[k]||0;
    if(k!=='전체' && n===0) continue;
    html+='<span class="f-chip'+(CAT===k?' is-on':'')+'" data-v="'+esc(k)+'">'+esc(k)+'<span class="cnt">'+n+'</span></span>';
  }
  byId('catFilter').innerHTML=html;
}

function buildSubChips(){
  var box=byId('subFilter');
  var subs=SUBCATS[CAT];
  if(!subs){ box.innerHTML=''; box.style.display='none'; return; }
  var counts={};
  for(var i=0;i<ITEMS.length;i++){ if(ITEMS[i].cat===CAT){ var s=itemSubtype(ITEMS[i]); counts[s]=(counts[s]||0)+1; } }
  var color=CAT_COLOR[CAT]||CAT_COLOR['기타'];
  box.style.setProperty('--catcolor', color);
  var total=0; for(var t in counts) total+=counts[t];
  var html='<span class="f-subchip'+(SUBCAT==='전체'?' is-on':'')+'" data-v="전체">전체<span class="cnt">'+total+'</span></span>';
  for(var j=0;j<subs.length;j++){
    var k=subs[j]; var n=counts[k]||0; if(n===0) continue;
    html+='<span class="f-subchip'+(SUBCAT===k?' is-on':'')+'" data-v="'+esc(k)+'">'+(SUBICON[k]||'')+' '+esc(k)+'<span class="cnt">'+n+'</span></span>';
  }
  box.innerHTML=html; box.style.display='flex';
}

function buildMagicOptions(){
  var counts={}, hasCount=0;
  for(var i=0;i<ITEMS.length;i++){
    if(hasMagic(ITEMS[i])){ var m=ITEMS[i].magicName; counts[m]=(counts[m]||0)+1; hasCount++; }
  }
  /* 주술명 정렬: 기본이름 → 레벨 순 */
  var names=Object.keys(counts).sort(function(a,b){
    function base(s){ return s.replace(/\s*Lv\d+\s*$/,''); }
    function lv(s){ var m=s.match(/Lv(\d+)/); return m?parseInt(m[1],10):0; }
    var ba=base(a), bb=base(b);
    if(ba!==bb) return ba.localeCompare(bb,'ko');
    return lv(a)-lv(b);
  });
  var html='<option value="전체">전체 아이템</option>';
  html+='<option value="__has__">주술 있는 것만 ('+hasCount+')</option>';
  for(var j=0;j<names.length;j++){
    var n=names[j];
    html+='<option value="'+esc(n)+'"'+(MAGIC===n?' selected':'')+'>'+esc(n)+' ('+counts[n]+')</option>';
  }
  var sel=byId('magicSel');
  sel.innerHTML=html;
  sel.value = MAGIC;
}

function render(){
  var arr=applyFilter();
  byId('statTotal').textContent=ITEMS.length;
  byId('statShown').textContent=arr.length;
  byId('statCat').textContent=CAT;

  var grid=byId('grid'), empty=byId('empty'), more=byId('loadmore'), deck=byId('deck');
  if(!arr.length){
    grid.innerHTML=''; grid.style.display='none'; deck.style.display='none';
    empty.style.display='block'; more.style.display='none'; return;
  }
  empty.style.display='none';

  if(VIEW==='deck'){
    grid.style.display='none'; more.style.display='none'; deck.style.display='flex';
    renderDeck(arr);
    return;
  }
  deck.style.display='none'; grid.style.display='';

  if(VIEW==='text'){
    grid.className='text-view';
    grid.innerHTML=tableHTML(arr);
    more.style.display='none';
    var tbl=grid.querySelector('.item-table'), r1=grid.querySelector('.item-table thead tr:first-child');
    if(tbl&&r1) tbl.style.setProperty('--h1', r1.offsetHeight+'px');
  }else{
    grid.className='';
    var slice=arr.slice(0,SHOWN);
    grid.innerHTML=slice.map(function(it,pos){ return cardHTML(it, ITEMS.indexOf(it), pos); }).join('');
    more.style.display = arr.length>SHOWN ? 'block' : 'none';
  }
}

/* ===== 3D 덱 ===== */
var DECK_I=0, deckList=[], deckMoved=false, deckSig='';
function renderDeck(list){
  var sig=list.length+'|'+(list.length?list[0].id:'')+'|'+(list.length?list[list.length-1].id:'');
  if(sig!==deckSig){ DECK_I=0; deckSig=sig; }
  deckList=list;
  if(DECK_I>=list.length) DECK_I=0;
  if(DECK_I<0) DECK_I=0;
  var stage=byId('deckStage');
  stage.innerHTML=list.map(function(it,i){
    return '<div class="deck-card" data-i="'+i+'"><div class="dcard">'+detailCardHTML(it)+'</div></div>';
  }).join('');
  layoutDeck();
}
function layoutDeck(){
  var stage=byId('deckStage'); if(!stage) return;
  var cards=stage.children, W=stage.clientWidth||900;
  var spread=Math.min(210, Math.max(120, W*0.23));
  for(var i=0;i<cards.length;i++){
    var el=cards[i], d=i-DECK_I, ad=Math.abs(d);
    if(ad>4){ el.style.display='none'; continue; }
    el.style.display='';
    var tx=d*spread, ry=Math.max(-44,Math.min(44,-d*20)), tz=-ad*170,
        sc=Math.max(0.66,1-ad*0.11), op=ad>=4?0:(1-ad*0.24);
    el.style.transform='translateX('+tx+'px) translateZ('+tz+'px) rotateY('+ry+'deg) scale('+sc+')';
    el.style.opacity=op; el.style.zIndex=String(100-ad);
    el.classList.toggle('is-center', d===0);
  }
  var cnt=byId('deckCount');
  if(cnt) cnt.innerHTML=deckList.length?('<b>'+(DECK_I+1)+'</b> / '+deckList.length):'';
}
function deckGo(n){ if(!deckList.length) return; DECK_I=Math.max(0,Math.min(deckList.length-1,n)); layoutDeck(); }

/* ===== 이벤트 ===== */
function bindEvents(){
  byId('search').addEventListener('input', function(){ QUERY=this.value; SHOWN=PAGE_STEP; render(); });
  byId('sortSel').addEventListener('change', function(){ SORT=this.value; SHOWN=PAGE_STEP; render(); });
  byId('magicSel').addEventListener('change', function(){ MAGIC=this.value; SHOWN=PAGE_STEP; render(); });

  byId('catFilter').addEventListener('click', function(e){
    var chip=e.target.closest('.f-chip'); if(!chip) return;
    CAT=chip.getAttribute('data-v'); SUBCAT='전체'; SHOWN=PAGE_STEP;
    buildCatChips(); buildSubChips(); render();
  });
  byId('subFilter').addEventListener('click', function(e){
    var chip=e.target.closest('.f-subchip'); if(!chip) return;
    SUBCAT=chip.getAttribute('data-v'); SHOWN=PAGE_STEP;
    buildSubChips(); render();
  });
  byId('viewSeg').addEventListener('click', function(e){
    var btn=e.target.closest('button'); if(!btn) return;
    VIEW=btn.getAttribute('data-v');
    Array.prototype.forEach.call(this.querySelectorAll('button'),function(b){ b.classList.toggle('active', b===btn); });
    render();
  });
  byId('loadmore').addEventListener('click', function(){ SHOWN+=PAGE_STEP; render(); });

  byId('grid').addEventListener('click', function(e){
    var el=e.target.closest('[data-idx]'); if(!el) return;
    var it=ITEMS[parseInt(el.getAttribute('data-idx'),10)]; if(it) openModal(it);
  });

  /* 덱: 화살표 / 좌우카드 클릭 / 드래그·스와이프 / 키보드 / 리사이즈 */
  byId('deckPrev').addEventListener('click', function(){ deckGo(DECK_I-1); });
  byId('deckNext').addEventListener('click', function(){ deckGo(DECK_I+1); });
  byId('deckStage').addEventListener('click', function(e){
    if(deckMoved){ deckMoved=false; return; }
    var card=e.target.closest('.deck-card'); if(!card) return;
    var i=parseInt(card.getAttribute('data-i'),10);
    if(i!==DECK_I) deckGo(i);
  });
  (function(){
    var stage=byId('deckStage'), active=false, startX=0, startI=0;
    stage.addEventListener('pointerdown', function(e){ active=true; startX=e.clientX; startI=DECK_I; deckMoved=false; });
    window.addEventListener('pointermove', function(e){
      if(!active) return;
      var dx=e.clientX-startX;
      if(Math.abs(dx)>6) deckMoved=true;
      var step=Math.round(-dx/70);
      var ni=Math.max(0,Math.min(deckList.length-1,startI+step));
      if(ni!==DECK_I){ DECK_I=ni; layoutDeck(); }
    });
    window.addEventListener('pointerup', function(){ active=false; });
    window.addEventListener('pointercancel', function(){ active=false; });
  })();
  window.addEventListener('resize', function(){ if(VIEW==='deck') layoutDeck(); });

  byId('modalClose').addEventListener('click', closeModal);
  byId('item-modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape'){ closeModal(); return; }
    if(VIEW==='deck' && !byId('item-modal').classList.contains('open')){
      if(e.key==='ArrowLeft'){ deckGo(DECK_I-1); e.preventDefault(); }
      else if(e.key==='ArrowRight'){ deckGo(DECK_I+1); e.preventDefault(); }
    }
  });
}

/* ===== 라이브 데이터 로딩(서버 최신 itemset6.txt 파싱) ===== */
var IDX={name:0,sys:1,desc:2,setStat:3,setCmd1:11,setCmd2:12,id:16,gfx:17,type:19,setCode:34,
  minHit:35,maxHit:36,minAtk:37,maxAtk:38,minDef:39,maxDef:40,minDex:41,maxDex:42,minHP:43,maxHP:44,
  minCharm:49,maxCharm:50,minEva:51,maxEva:52,magic:55,stamina:57,hit:61,minCrit:75,maxCrit:76};
function intOnly(x){ var s=trim(x); if(!s) return '-'; var m=s.match(/-?\d+/); return m?m[0]:'-'; }
function numOf(x){ var v=Number(trim(x)); return isFinite(v)?v:0; }
function partToBase(p){ p=parseInt(p,10);
  if([0,1,2,3,4,17,18,19].indexOf(p)>=0) return '무기';
  if([6,7].indexOf(p)>=0) return '방어구';
  if([8,9,10,11,13,14,15].indexOf(p)>=0) return '장신구';
  if([20].indexOf(p)>=0) return '소모';
  if([24,25,26,27].indexOf(p)>=0) return '토템';
  return '기타';
}
function detectCat(name,route,desc,part){
  var all=norm(name+' '+route+' '+desc); var base=partToBase(part);
  if(all.indexOf('초보자')>=0) return '초보자';
  if(all.indexOf('페트병')>=0||all.indexOf('펫병')>=0) return '페트병';
  if(all.indexOf('변신')>=0||all.indexOf('캐릭터')>=0) return '캐릭터';
  if(all.indexOf('요리')>=0||all.indexOf('고기')>=0||all.indexOf('스프')>=0) return '요리';
  if(all.indexOf('이벤트')>=0) return '이벤트';
  if(all.indexOf('보조')>=0) return '보조';
  return base;
}
function parseMagic(text){
  var map={}, lines=String(text||'').split(/\r?\n/);
  for(var i=0;i<lines.length;i++){ var line=trim(lines[i]); if(!line||line.charAt(0)==='#'||line.indexOf('//')===0) continue;
    var a=line.split(','); var nm=trim(a[0]), code=trim(a[4]); if(nm&&code) map[code]=nm; }
  return map;
}
function parseSetEffect(a){
  var c1=trim(a[IDX.setCmd1]), c2=trim(a[IDX.setCmd2]);
  if(c1!=='ITEM_suitEquip'&&c2!=='ITEM_ResuitEquip') return '';
  if(isEmptyVal(intOnly(a[IDX.setCode]))) return '';
  var m=trim(a[IDX.setStat]).match(/^([A-Z_]+)\s*:\s*(-?\d+)/i); if(!m) return '';
  var map={MSTR:'공',MTGH:'방',MDEX:'순',MVITAL:'내'};
  var label=map[(m[1]||'').toUpperCase()]; if(!label) return '';
  var v=Number(m[2]); if(!isFinite(v)||v===0) return '';
  return '세트효과 '+label+(v>0?'+':'')+v;
}
function parseItem(line, magicMap, order){
  var a=String(line||'').split(',');
  var name=trim(a[IDX.name]), id=trim(a[IDX.id]);
  if(!name||!id) return null;
  var route=trim(a[IDX.sys]), desc=trim(a[IDX.desc]), part=numOf(a[IDX.type]);
  var magicCode=intOnly(a[IDX.magic]), stamina=intOnly(a[IDX.stamina]), magicName='주술없음';
  if(magicCode!=='-'&&magicMap[magicCode]) magicName=magicMap[magicCode];
  return {o:order,name:name,id:id,gfx:trim(a[IDX.gfx]),route:route,desc:desc,part:part,
    cat:detectCat(name,route,desc,part),setEff:parseSetEffect(a),
    minHit:intOnly(a[IDX.minHit]),maxHit:intOnly(a[IDX.maxHit]),
    minAtk:intOnly(a[IDX.minAtk]),maxAtk:intOnly(a[IDX.maxAtk]),
    minDef:intOnly(a[IDX.minDef]),maxDef:intOnly(a[IDX.maxDef]),
    minDex:intOnly(a[IDX.minDex]),maxDex:intOnly(a[IDX.maxDex]),
    minHP:intOnly(a[IDX.minHP]),maxHP:intOnly(a[IDX.maxHP]),
    minCrit:intOnly(a[IDX.minCrit]),maxCrit:intOnly(a[IDX.maxCrit]),
    minEva:intOnly(a[IDX.minEva]),maxEva:intOnly(a[IDX.maxEva]),
    hit:intOnly(a[IDX.hit]),minCharm:intOnly(a[IDX.minCharm]),maxCharm:intOnly(a[IDX.maxCharm]),
    magicName:magicName,stamina:stamina};
}
async function fetchTextSmart(url){
  var res=await fetch(url,{cache:'no-store'}); if(!res.ok) return '';
  var buf=await res.arrayBuffer();
  var encs=['utf-8','euc-kr','windows-949']; var best='',bestScore=-1e9;
  for(var i=0;i<encs.length;i++){ try{
    var txt=new TextDecoder(encs[i],{fatal:false}).decode(buf);
    var broken=(txt.match(/\uFFFD/g)||[]).length, kor=(txt.match(/[가-힣]/g)||[]).length;
    var sc=kor*2-broken*80; if(sc>bestScore){ bestScore=sc; best=txt; }
  }catch(e){} }
  return best;
}
async function loadLive(){
  try{
    var magicText=await fetchTextSmart(MAGIC_FILE);
    var magicMap=parseMagic(magicText);
    var itemText=await fetchTextSmart(DATA_FILE);
    if(!itemText) throw new Error('no data');
    var lines=itemText.split(/\r?\n/), parsed=[];
    for(var i=0;i<lines.length;i++){ var line=trim(lines[i]); if(!line||line.charAt(0)==='#'||line.indexOf('//')===0) continue;
      var it=parseItem(line, magicMap, parsed.length); if(it) parsed.push(it); }
    if(parsed.length){
      ITEMS=parsed;
      buildCatChips(); buildSubChips(); buildMagicOptions(); render();
      byId('loadStatus').textContent='서버 최신 '+ITEMS.length+'개 ✓';
    }
  }catch(e){
    byId('loadStatus').textContent='아이템 '+ITEMS.length+'개';
  }
}

/* ===== 시작 ===== */
bindEvents();
buildCatChips();
buildSubChips();
buildMagicOptions();
render();
byId('loadStatus').textContent='아이템 '+ITEMS.length+'개';
loadLive();
</script>
