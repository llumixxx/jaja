name: Update Pet Data

on:
  schedule:
    - cron: '0 */3 * * *'   # 3시간마다 자동 실행
  workflow_dispatch:         # Actions 탭에서 수동 실행도 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest pet data from sa000001.com
        run: |
          curl -sf "https://sa000001.com/sa2/info/api/pet_data.php" -o pet_data.json
          echo "다운로드 완료, 크기:"
          wc -c pet_data.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pet_data.json
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 스킵"
          else
            git commit -m "펫 데이터 자동 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

