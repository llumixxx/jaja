name: Update Pet Data

on:
  schedule:
    - cron: '0 */3 * * *'   # 3시간마다 자동 실행
  workflow_dispatch:         # Actions 탭에서 수동 실행도 가능

permissions:
  contents: write

# 이 워크플로우는 동시에 여러 개가 돌면 안 됨 (같은 브랜치에 push 경쟁 발생 → 실패 원인).
# 이미 실행 중이면 새로 트리거된 건 취소하지 않고 대기열에 넣어 순서대로 실행.
concurrency:
  group: update-pet-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest pet data from sa000001.com
        run: |
          curl -sf "https://sa000001.com/sa2/info/api/pet_data.php" -o pet_data.json
          echo "펫 데이터 다운로드 완료, 크기:"
          wc -c pet_data.json
          curl -sf "https://sa000001.com/sa2/info/data/SA_PET_IMAGE.csv" -o pet_skin.csv || echo "스킨 CSV 없음 (건너뜀)"
          if [ -f pet_skin.csv ]; then echo "스킨 CSV 다운로드 완료, 크기:"; wc -c pet_skin.csv; fi

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pet_data.json pet_skin.csv
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 스킵"
            exit 0
          fi
          git commit -m "펫 데이터 자동 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"

          # push 시도 중 remote에 새 커밋이 먼저 올라와 있으면(거의 concurrency로 막히지만 혹시 몰라)
          # rebase로 안전하게 맞추고 재시도. 최대 5번.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "push 성공"
              exit 0
            fi
            echo "push 실패 (시도 $i/5) - 최신 내역 받아서 재시도합니다"
            git fetch origin main
            git rebase origin/main || { echo "rebase 충돌 - 수동 확인 필요"; exit 1; }
            sleep $((i * 3))
          done
          echo "5번 재시도했지만 push 실패"
          exit 1
