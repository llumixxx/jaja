<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StoneAge 환각 계산기</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <header>

        <h1>🐲 StoneAge 환각 계산기</h1>

        <p>공식 데이터를 기반으로 환각 여부를 계산합니다.</p>

    </header>



    <section class="pet-search">

        <label>펫 검색</label>

        <input
            type="text"
            id="petSearch"
            placeholder="펫 이름 입력">

        <div id="searchResult"></div>

    </section>



    <section class="pet-info">

        <div class="image">

            <img
                id="petImage"
                src="https://placehold.co/180x180"
                alt="pet">

        </div>

        <div class="info">

            <div>

                <span>선택한 펫</span>

                <strong id="petName">
                    선택 안됨
                </strong>

            </div>

            <div>

                <span>속성</span>

                <strong id="petAttr">
                    -
                </strong>

            </div>

            <div>

                <span>기본 성장</span>

                <strong id="petBase">
                    -
                </strong>

            </div>

        </div>

    </section>




    <section class="inputBox">

        <h2>Lv1 초기 능력치</h2>

        <div class="grid">

            <div class="item">
                <label>내구</label>
                <input
                    id="hp"
                    type="number">
            </div>

            <div class="item">
                <label>공격</label>
                <input
                    id="atk"
                    type="number">
            </div>

            <div class="item">
                <label>방어</label>
                <input
                    id="def"
                    type="number">
            </div>

            <div class="item">
                <label>순발</label>
                <input
                    id="spd"
                    type="number">
            </div>

        </div>

    </section>



    <section class="buttons">

        <button id="calcBtn">

            환각 계산하기

        </button>

    </section>





    <section class="result">

        <h2>계산 결과</h2>

        <div class="resultCard">

            <div class="row">

                <span>환각 여부</span>

                <strong id="resultRank">

                    -

                </strong>

            </div>

            <div class="row">

                <span>가능한 조합</span>

                <strong id="resultCount">

                    -

                </strong>

            </div>

            <div class="row">

                <span>환각 확률</span>

                <strong id="resultRate">

                    -

                </strong>

            </div>

            <div class="row">

                <span>예상 시도 횟수</span>

                <strong id="resultTry">

                    -

                </strong>

            </div>

        </div>

    </section>





    <section class="matchList">

        <h2>가능한 조합</h2>

        <div id="matchTable">

        </div>

    </section>




</div>



<script src="api.js"></script>

<script src="calc.js"></script>

<script src="script.js"></script>

</body>

</html>
