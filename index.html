<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쟈쟈서버 환각 계산기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf9ff; --bg2:#f3f0ff; --white:#ffffff;
  --s1:#f8f7ff; --s2:#f0eeff;
  --border:#e8e3ff; --border2:#d4cbff;
  --a1:#9b87f5; --a2:#f587b8; --a3:#87d4f5; --a4:#f5c887; --a5:#87f5c0;
  --t1:#3d3560; --t2:#7b72a8; --t3:#b0a8d4; --t4:#d4cff0;
  --ok:#6dd5a0; --err:#f57878;
  --shadow:0 4px 24px rgba(155,135,245,0.12);
  --shadow2:0 8px 32px rgba(155,135,245,0.18);
}
[data-theme="dark"] {
  --bg:#0f0f1a; --bg2:#1a1a2e; --white:#252540;
  --s1:#2a2a45; --s2:#353555;
  --border:#404060; --border2:#505080;
  --t1:#e8e8f0; --t2:#b0b0c8; --t3:#8080a0; --t4:#606080;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow2:0 8px 32px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;
  background-image:radial-gradient(circle at 15% 20%, rgba(155,135,245,0.08) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(245,135,184,0.07) 0%, transparent 50%);}

.dark-toggle{position:fixed;top:14px;right:14px;width:40px;height:40px;border-radius:50%;
  border:2px solid var(--border2);background:var(--white);cursor:pointer;font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;transition:all .3s;z-index:1000;box-shadow:var(--shadow);}
.dark-toggle:hover{transform:scale(1.1) rotate(-8deg);border-color:var(--a1);}
[data-theme="dark"] .toggle-moon{display:inline;} [data-theme="dark"] .toggle-sun{display:none !important;}
[data-theme="light"] .toggle-moon{display:none !important;} [data-theme="light"] .toggle-sun{display:inline;}

.nav-pill{position:fixed;top:14px;left:14px;z-index:1000;display:flex;gap:6px;}
.nav-pill a{text-decoration:none;background:var(--white);border:1.5px solid var(--border2);
  border-radius:20px;padding:8px 15px;font-size:12.5px;font-weight:800;color:var(--t2);box-shadow:var(--shadow);}
.nav-pill a.on{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-color:transparent;}

.main-inner{max-width:920px;margin:0 auto;padding:70px 20px 80px;}
.page-head{text-align:center;padding:6px 0 26px;}
.wind-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#f0eeff,#ffeef6);
  border:1.5px solid var(--border2);border-radius:20px;padding:6px 14px;margin-bottom:12px;box-shadow:0 4px 12px rgba(155,135,245,.12);}
.wind-badge-dot{width:7px;height:7px;background:var(--a2);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(2)}}
.wind-badge span{font-size:11px;font-weight:800;color:var(--t2);font-family:'Nunito',sans-serif;letter-spacing:.5px;}
.page-title{font-family:'Nunito',sans-serif;font-size:34px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--a1) 0%,var(--a2) 60%,var(--a4) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.15;margin-bottom:6px;filter:drop-shadow(0 2px 4px rgba(155,135,245,.15));}
.page-sub{font-size:12px;color:var(--t3);font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:1px;}
#loadStatus{font-size:11.5px;color:var(--t3);margin-top:10px;}

.calc-grid-layout{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start;}
@media(max-width:820px){ .calc-grid-layout{grid-template-columns:1fr;} }

.card{background:var(--white);border:3px solid #fff;outline:2px solid var(--border);border-radius:24px;
  padding:20px;box-shadow:0 8px 24px rgba(155,135,245,0.12),inset 0 -3px 0 rgba(155,135,245,0.05);}

/* 왼쪽: 펫 검색/선택 */
.search-input{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:20px;
  font-family:inherit;font-size:14px;background:var(--s1);color:var(--t1);outline:none;margin-bottom:10px;}
.search-input:focus{border-color:var(--a1);}
.pet-suggest{max-height:220px;overflow-y:auto;border-radius:14px;}
.pet-suggest-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;cursor:pointer;}
.pet-suggest-item:hover{background:var(--s1);}
.pet-suggest-item img{width:32px;height:32px;object-fit:contain;image-rendering:pixelated;border-radius:8px;background:var(--s1);}
.pet-suggest-item .n{font-size:13px;font-weight:700;color:var(--t1);}
.pet-suggest-item .h{font-size:10px;color:var(--t3);}

.selected-pet-box{margin-top:14px;}
.skeleton{background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 37%,var(--s1) 63%);background-size:400% 100%;
  animation:sk 1.4s infinite; border-radius:12px;}
@keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}
.empty-state{text-align:center;padding:30px 10px;color:var(--t3);font-size:12.5px;}
.empty-state .g{font-size:30px;margin-bottom:8px;opacity:.5;}

.sel-pet-hero{display:flex;gap:12px;align-items:center;margin-bottom:12px;}
.sel-pet-img{width:60px;height:60px;border-radius:14px;background:var(--s1);border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.sel-pet-img img{width:52px;height:52px;object-fit:contain;image-rendering:pixelated;}
.sel-pet-name{font-size:17px;font-weight:900;font-family:'Nunito',sans-serif;color:var(--t1);}
.sel-pet-how{font-size:11px;color:var(--t3);margin-top:2px;}

.mini-pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.mini-pair-box{background:var(--s1);border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;}
.mini-pair-box .t{font-size:9px;color:var(--t3);font-weight:800;letter-spacing:1px;margin-bottom:4px;font-family:'Nunito',sans-serif;}
.mini-pair-line{display:flex;justify-content:space-between;font-size:11.5px;padding:1px 0;}
.mini-pair-line span:first-child{color:var(--t3);}
.mini-pair-line b{color:var(--a1);font-family:'Nunito',sans-serif;}
.total-pill{margin-top:8px;text-align:center;background:linear-gradient(135deg,var(--s2),#ffeef6);
  border:1.5px solid var(--border2);border-radius:10px;padding:8px;}
.total-pill .v{font-size:19px;font-weight:900;font-family:'Nunito',sans-serif;color:var(--a1);}
.total-pill .l{font-size:9.5px;color:var(--t2);font-weight:800;}

/* 오른쪽: 스탯 입력 */
.section-title{font-size:10px;letter-spacing:2px;color:var(--t3);font-family:'Nunito',sans-serif;
  font-weight:800;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'';display:block;width:3px;height:14px;
  background:linear-gradient(135deg,var(--a1),var(--a2));border-radius:2px;}
.stat-input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.stat-input-box{background:var(--s1);border:1.5px solid var(--border);border-radius:16px;padding:12px 14px;}
.stat-input-box .lbl{font-size:11px;color:var(--t3);font-weight:800;margin-bottom:8px;font-family:'Nunito',sans-serif;}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper button{width:32px;height:32px;border-radius:10px;border:1.5px solid var(--border2);
  background:var(--white);color:var(--a1);font-size:16px;font-weight:900;cursor:pointer;flex-shrink:0;}
.stepper button:hover{background:var(--a1);color:#fff;}
.stepper input{width:100%;text-align:center;border:none;background:transparent;font-size:19px;
  font-weight:900;font-family:'Nunito',sans-serif;color:var(--t1);outline:none;}
.stat-atk .lbl{color:#e07db8;} .stat-def .lbl{color:var(--a1);} .stat-agi .lbl{color:#3fae8a;} .stat-hp .lbl{color:#c4822a;}

.calc-btn{width:100%;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border:none;
  padding:14px;border-radius:16px;font-weight:900;font-size:15px;cursor:pointer;font-family:'Nunito',sans-serif;
  letter-spacing:.5px;box-shadow:0 6px 18px rgba(155,135,245,.3);}
.calc-btn:hover{filter:brightness(1.06);transform:translateY(-1px);}
.calc-btn:active{transform:scale(.98);}
.fill-btn{width:100%;background:var(--white);border:1.5px solid var(--border2);color:var(--t2);
  padding:11px;border-radius:16px;font-weight:800;font-size:12.5px;cursor:pointer;margin-bottom:10px;}
.fill-btn:hover{border-color:var(--a1);color:var(--a1);}

#calcResult{margin-top:18px;}
.result-empty{text-align:center;padding:26px 10px;color:var(--t3);font-size:12.5px;}
.result-empty .g{font-size:28px;margin-bottom:8px;opacity:.5;}
.grade-badge{display:inline-block;padding:8px 20px;border-radius:20px;font-weight:900;font-size:18px;
  font-family:'Nunito',sans-serif;background:linear-gradient(135deg,var(--s2),#ffeef6);border:2px solid var(--a1);color:var(--a1);}
.grade-badge.hall{border-color:#f5a623;color:#f5a623;background:linear-gradient(135deg,#fff6e0,#ffeecb);}
.result-msg{font-size:12.5px;color:var(--t2);margin:8px 0 12px;}
.result-note{font-size:11px;color:var(--t3);margin-bottom:10px;line-height:1.6;background:var(--s1);
  border-radius:10px;padding:8px 12px;border:1.5px solid var(--border);}
.dist-row{display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:11.5px;}
.dist-label{flex:0 0 78px;font-weight:900;color:var(--a1);font-family:'Nunito',sans-serif;}
.dist-label.hall{color:#f5a623;}
.dist-meta{color:var(--t2);font-variant-numeric:tabular-nums;font-size:11px;}

footer{text-align:center;padding:30px;color:var(--t3);font-size:11px;font-family:'Nunito',sans-serif;}
@media(max-width:640px){ .page-title{font-size:24px;} .nav-pill{position:static;justify-content:center;margin-bottom:10px;} .main-inner{padding-top:16px;} }
</style>
</head>
<body>

<div class="nav-pill">

<button class="dark-toggle" onclick="toggleDark()"><span class="toggle-moon">🌙</span><span class="toggle-sun">☀️</span></button>

<div class="main-inner">
  <div class="page-head">
    <div class="wind-badge"><span class="wind-badge-dot"></span><span>SA JYAJYA SERVER</span></div>
    <div class="page-title">쟈쟈 환각 계산기</div>
    <div class="page-sub">Lv.1 초기치로 환각(8등급) 가능성을 확인해보세요</div>
    <div id="loadStatus"></div>
  </div>

  <div class="calc-grid-layout">
    <!-- 왼쪽: 펫 선택 -->
    <div class="card">
      <div class="section-title">펫 선택</div>
      <input type="text" id="petSearch" class="search-input" placeholder="펫 이름 검색..." autocomplete="off" />
      <div class="pet-suggest" id="petSuggest"></div>

      <div class="selected-pet-box" id="selectedBox">
        <div class="empty-state"><div class="g">🐾</div>펫을 검색해서 선택해줘</div>
      </div>
    </div>

    <!-- 오른쪽: 스탯 입력 + 결과 -->
    <div class="card">
      <div class="section-title">Lv.1 초기치 입력</div>
      <div id="statInputWrap">
        <div class="empty-state"><div class="g">✏️</div>펫을 먼저 선택해줘</div>
      </div>
    </div>
  </div>
</div>

<footer>SA 쟈쟈서버 비공식 팬 도구 · made by 루믹스</footer>

let PETS = SEED.slice().filter(p => String(p.how||"").replace(/\s+/g,"").trim() !== "미출시");

const IMG_BASE = "https://sa000001.com/sa2/info/img/";

function num(v){ const n = Number(v); return isFinite(n) ? n : 0; }
function cut2(n){ n=Number(n); if(!isFinite(n)) return "-"; return (Math.floor(n*100)/100).toFixed(2).replace(/\.?0+$/, ""); }
function dropDecimalInt(v){ v=Number(v); return isFinite(v)?Math.floor(v):0; }
function rankInfoB(sum){ if(sum>=100)return 475; if(sum>=95)return 495; if(sum>=90)return 515; if(sum>=85)return 535; if(sum>=80)return 555; return 575; }
function disp(h,a,d,s){ return { h:h*4+a+d+s, a:h*0.1+a+d*0.1+s*0.05, d:h*0.1+a*0.1+d+s*0.05, s:s }; }
function calcStats(r){
  const baseSum = num(r.h0)+num(r.a0)+num(r.d0)+num(r.s0);
  const B = rankInfoB(baseSum);
  const ph=num(r.h0)+num(r.lvup), pa=num(r.a0)+num(r.lvup), pd=num(r.d0)+num(r.lvup), ps=num(r.s0)+num(r.lvup);
  const init = disp(num(r.initPct)*ph/100, num(r.initPct)*pa/100, num(r.initPct)*pd/100, num(r.initPct)*ps/100);
  const growth = disp(ph*B/10000, pa*B/10000, pd*B/10000, ps*B/10000);
  return { init, growth, totalGrowth: growth.a+growth.d+growth.s };
}
function normalizedName(p){ return String(p.name||"").replace(/^\uFEFF/, ""); }
function imgTag(code, cls){
  return `<img class="${cls||''}" src="${IMG_BASE}${code}.png" loading="lazy"
    onerror="this.onerror=function(){this.onerror=null;this.src='${IMG_BASE}placeholder.gif';};this.src='${IMG_BASE}${code}.gif';" />`;
}

function renderSuggest(q){
  const box = document.getElementById("petSuggest");
  if(!q){ box.innerHTML = ""; return; }
  const hits = PETS.filter(p => normalizedName(p).includes(q)).slice(0, 12);
  if(!hits.length){ box.innerHTML = '<div style="padding:10px;color:var(--t3);font-size:12px;">검색 결과 없음</div>'; return; }
  box.innerHTML = hits.map(p => {
    const idx = PETS.indexOf(p);
    return `<div class="pet-suggest-item" data-idx="${idx}">${imgTag(p.imageCode)}<div><div class="n">${normalizedName(p)}</div><div class="h">${p.how||""}</div></div></div>`;
  }).join("");
}
document.getElementById("petSearch").addEventListener("input", e=>{ renderSuggest(e.target.value.trim()); });
document.getElementById("petSuggest").addEventListener("click", e=>{
  const item = e.target.closest(".pet-suggest-item"); if(!item) return;
  selectPet(parseInt(item.dataset.idx));
  document.getElementById("petSuggest").innerHTML = "";
  document.getElementById("petSearch").value = "";
});

function selectPet(idx){
  selectedPet = PETS[idx];
  renderSelectedBox();
  renderStatInputs();
}

function calcInitWithRollBase(r, rh, ra, rd, rs, hb, ab, db, sb){
  const ph = num(r.h0)+num(r.lvup)+num(rh)+num(hb);
  const pa = num(r.a0)+num(r.lvup)+num(ra)+num(ab);
  const pd = num(r.d0)+num(r.lvup)+num(rd)+num(db);
  const ps = num(r.s0)+num(r.lvup)+num(rs)+num(sb);
  return disp(num(r.initPct)*ph/100, num(r.initPct)*pa/100, num(r.initPct)*pd/100, num(r.initPct)*ps/100);
}
function gradeLabel(g){ if(g===8) return "8등급 환각"; if(g>=0) return g+"등급"; return String(g)+"등급"; }
function getAllHwangakMatches(r, targetH, targetA, targetD, targetS){
  const matches = [];
  for(let rh=-2; rh<=2; rh++)
  for(let ra=-2; ra<=2; ra++)
  for(let rd=-2; rd<=2; rd++)
  for(let rs=-2; rs<=2; rs++)
  for(let ab=0; ab<=HWANGAK_BASE_POOL; ab++)
  for(let db=0; db<=HWANGAK_BASE_POOL-ab; db++)
  for(let sb=0; sb<=HWANGAK_BASE_POOL-ab-db; sb++){
    const hb = HWANGAK_BASE_POOL - ab - db - sb;
    const init = calcInitWithRollBase(r, rh, ra, rd, rs, hb, ab, db, sb);
    const ch=dropDecimalInt(init.h), ca=dropDecimalInt(init.a), cd=dropDecimalInt(init.d), cs=dropDecimalInt(init.s);
    if(ch!==targetH || ca!==targetA || cd!==targetD || cs!==targetS) continue;
    matches.push({ grade: rh+ra+rd+rs, h:rh,a:ra,d:rd,s:rs, fh:hb,fa:ab,fd:db,fs:sb });
  }
  return matches;
}

function runCalc(){
  const p = selectedPet;
  const hp = parseInt(document.getElementById("calcHp").value, 10);
  const atk = parseInt(document.getElementById("calcAtk").value, 10);
  const def = parseInt(document.getElementById("calcDef").value, 10);
  const dex = parseInt(document.getElementById("calcDex").value, 10);
  const box = document.getElementById("calcResult");

  if([hp,atk,def,dex].some(v=>!isFinite(v))){
    box.innerHTML = '<div class="result-empty"><div class="g">⚠️</div>내구/공격/방어/순발 4칸 모두 정수로 입력해줘.</div>';
    return;
  }
  box.innerHTML = '<div class="result-empty"><div class="g">⏳</div>계산 중...</div>';

  setTimeout(()=>{
    const matches = getAllHwangakMatches(p, hp, atk, def, dex);
    if(!matches.length){
      box.innerHTML = '<div class="result-empty"><div class="g">❌</div>일치하는 조합이 없어. 입력한 초기치를 다시 확인해줘.</div>';
      return;
    }
    let best = -999;
    matches.forEach(m=>{ if(m.grade>best) best=m.grade; });
    const picked = matches.filter(m=>m.grade===best).sort((x,y)=>(x.fh+x.fa+x.fd+x.fs)-(y.fh+y.fa+y.fd+y.fs));

    let msg;
    if(best>=8) msg="🎉 환각 가능성이 포함된 초기치입니다!";
    else if(best>=6) msg="상위권 초기치입니다.";
    else if(best>=3) msg="준수한 초기치입니다.";
    else if(best>=0) msg="보통권 초기치입니다.";
    else msg="낮은 초기치로 추정됩니다.";

    let html = `<div style="text-align:center;"><span class="grade-badge ${best>=8?'hall':''}">${gradeLabel(best)}</span></div>`;
    html += `<div class="result-msg" style="text-align:center;">${msg} (일치 조합 총 ${matches.length}건)</div>`;
    html += `<div class="result-note">표기: <b>[성장베이스](배분치)</b> · 배분치(깡스탯)는 4개 스탯에 걸쳐 총 ${HWANGAK_BASE_POOL}포인트가 무작위로 나뉘어 Lv.1 초기치에만 더해지며, 성장률에는 반영되지 않습니다.</div>`;

    const limit = Math.min(5, picked.length);
    for(let j=0;j<limit;j++){
      const m = picked[j];
      html += `<div class="dist-row"><div class="dist-label ${best===8?'hall':''}">${gradeLabel(best)}</div>
        <div class="dist-meta">내 [${m.h}](${m.fh}) / 공 [${m.a}](${m.fa}) / 방 [${m.d}](${m.fd}) / 순 [${m.s}](${m.fs})</div></div>`;
    }
    if(picked.length > limit){
      html += `<div class="result-note">동일 최고등급 조합 ${picked.length - limit}건이 더 있습니다.</div>`;
    }
    box.innerHTML = html;
  }, 30);
}

/* ===== 데이터 로딩 (local json → 라이브 fetch → 내장샘플 순서, 조용히 폴백) ===== */
function setStatus(msg){ document.getElementById("loadStatus").textContent = msg; }
function applyData(rows){
  PETS = rows.filter(p => String(p.how||"").replace(/\s+/g,"").trim() !== "미출시");
  const url = new URL(window.location.href);
  const wantName = url.searchParams.get("pet");
  if(wantName){
    const hit = PETS.find(p => normalizedName(p) === wantName) || PETS.find(p => normalizedName(p).includes(wantName));
    if(hit){ selectPet(PETS.indexOf(hit)); }
  }
}
async function fetchJson(url){
  const res = await fetch(url + (url.includes("?") ? "&" : "?") + "ts=" + Date.now(), {cache:"no-store"});
  if(!res.ok) throw new Error("http " + res.status);
  const data = await res.json();
  const rows = data.rows || data;
  if(!Array.isArray(rows) || rows.length === 0) throw new Error("empty rows");
  return rows;
}
async function loadLive(){
  setStatus("데이터 불러오는 중...");
  // 1순위: 같은 레포에 있는 pet_data.json (깃허브 액션이 3시간마다 자동 갱신, CORS 문제 없음)
  try{
    const rows = await fetchJson("./pet_data.json");
    applyData(rows);
    setStatus(`데이터 로딩 완료 · 총 ${PETS.length}종 (레포 동기화본)`);
    return;
  }catch(e){}
  // 2순위: sa000001.com 직접 fetch (CORS 허용되는 환경이면 성공)
  try{
    const rows = await fetchJson(API_URL);
    applyData(rows);
    setStatus(`데이터 로딩 완료 · 총 ${PETS.length}종 (실시간 직접연동)`);
    return;
  }catch(e){}
  // 3순위: 내장 샘플
  applyData(PETS);
  setStatus(`내장 샘플 ${PETS.length}종으로 표시 중`);
}
loadLive();
