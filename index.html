<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쟈쟈서버 환각 계산기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f7fd; --bg2:#e8f2fc; --white:#ffffff;
  --s1:#f0f7fd; --s2:#e3f0fb;
  --border:#dbe9f7; --border2:#bcd8f2;
  --a1:#2f7fd6; --a2:#22b6c9; --a3:#5aa8ea; --a4:#f5a623; --a5:#6fd0a0;
  --t1:#12253f; --t2:#4c6a8c; --t3:#8ea6c2; --t4:#c7dcf0;
  --ok:#3d9e6e; --err:#e05a5a;
  --shadow:0 4px 24px rgba(47,127,214,0.12);
  --shadow2:0 8px 32px rgba(47,127,214,0.18);
}
[data-theme="dark"] {
  --bg:#0a1420; --bg2:#0f1e30; --white:#132335;
  --s1:#16283c; --s2:#1c3149;
  --border:#233c56; --border2:#2c4a68;
  --t1:#e6f0fb; --t2:#a9c2dc; --t3:#7391b0; --t4:#4a637d;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow2:0 8px 32px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;
  background-image:radial-gradient(circle at 12% 8%, rgba(47,127,214,0.08) 0%, transparent 50%),
    radial-gradient(circle at 88% 90%, rgba(34,182,201,0.07) 0%, transparent 50%);}

/* ===== 사이드바 ===== */
.sidebar{width:300px;min-height:100vh;background:var(--white);border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;position:fixed;left:-300px;top:0;z-index:200;
  transition:left .32s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(47,127,214,0.08);}
.sidebar.open{left:0;}
.sb-head{padding:20px 16px 14px;border-bottom:1.5px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:8px;font-family:'Nunito',sans-serif;font-weight:900;
  font-size:16px;color:var(--a1);margin-bottom:4px;}
.sb-logo-dot{width:8px;height:8px;background:var(--a2);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(2)}}
.sb-sub{font-size:10.5px;color:var(--t3);font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:.5px;}
.sb-nav{display:flex;gap:6px;padding:12px 16px;border-bottom:1.5px solid var(--border);}
.sb-nav a{flex:1;text-decoration:none;text-align:center;padding:9px 6px;border-radius:12px;
  font-size:12.5px;font-weight:800;color:var(--t2);background:var(--s1);border:1.5px solid var(--border);}
.sb-nav a.on{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-color:transparent;}
.sb-search{padding:12px 16px 8px;}
.sb-search input{width:100%;padding:10px 14px;background:var(--s1);border:1.5px solid var(--border);
  border-radius:20px;font-family:inherit;font-size:13px;color:var(--t1);outline:none;}
.sb-search input:focus{border-color:var(--a1);}
.pet-section{padding:6px 12px 16px;flex:1;overflow-y:auto;min-height:0;}
.pet-section::-webkit-scrollbar{width:4px;}
.pet-section::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.pet-sec-title{font-size:10px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;
  margin:8px 4px;font-family:'Nunito',sans-serif;font-weight:800;}
.pet-item{display:flex;align-items:center;gap:9px;padding:8px 10px;margin-bottom:5px;
  background:var(--white);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .15s;}
.pet-item:hover{border-color:var(--a1);box-shadow:0 3px 12px rgba(47,127,214,.12);transform:translateY(-1px);}
.pet-item.active{border-color:var(--a1);background:var(--s2);box-shadow:0 3px 14px rgba(47,127,214,.15);}
.pet-item img{width:28px;height:28px;object-fit:contain;image-rendering:pixelated;border-radius:6px;background:var(--s1);flex-shrink:0;}
.pet-item-name{font-size:12.5px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t1);}
.sb-footer{padding:12px 16px;border-top:1.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sb-footer-txt{font-size:10.5px;color:var(--t3);}

.toggle-btn{position:fixed;top:16px;left:16px;z-index:300;width:42px;height:42px;background:var(--white);
  border:1.5px solid var(--border);border-radius:12px;color:var(--a1);font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;box-shadow:var(--shadow);}
.toggle-btn:hover{border-color:var(--a1);box-shadow:var(--shadow2);transform:scale(1.05);}
.toggle-btn.sb-open{left:314px;}
.dark-toggle{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);background:var(--white);
  cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;transition:all .3s;}
.dark-toggle:hover{transform:scale(1.1) rotate(-8deg);border-color:var(--a1);}
[data-theme="dark"] .toggle-moon{display:inline;} [data-theme="dark"] .toggle-sun{display:none !important;}
[data-theme="light"] .toggle-moon{display:none !important;} [data-theme="light"] .toggle-sun{display:inline;}

.main{flex:1;min-height:100vh;}
.main.shifted{margin-left:300px;}
@media(max-width:820px){ .main.shifted{margin-left:0;} .toggle-btn.sb-open{left:auto;right:16px;} }

.main-inner{max-width:760px;margin:0 auto;padding:70px 20px 80px;}
.page-head{text-align:center;padding:6px 0 26px;}
.wind-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--s2),#e0f7fa);
  border:1.5px solid var(--border2);border-radius:20px;padding:6px 14px;margin-bottom:12px;box-shadow:0 4px 12px rgba(47,127,214,.12);}
.wind-badge-dot{width:7px;height:7px;background:var(--a2);border-radius:50%;animation:pulse 2s infinite;}
.wind-badge span{font-size:11px;font-weight:800;color:var(--t2);font-family:'Nunito',sans-serif;letter-spacing:.5px;}
.page-title{font-family:'Nunito',sans-serif;font-size:34px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--a1) 0%,var(--a2) 70%,var(--a5) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.15;margin-bottom:6px;filter:drop-shadow(0 2px 4px rgba(47,127,214,.15));}
.page-sub{font-size:12px;color:var(--t3);font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:1px;}
#loadStatus{font-size:11.5px;color:var(--t3);margin-top:10px;}

.card{background:var(--white);border:1.5px solid var(--border);border-radius:24px;padding:20px;
  box-shadow:0 8px 24px rgba(47,127,214,0.08);margin-bottom:16px;}

.empty-state{text-align:center;padding:36px 10px;color:var(--t3);font-size:12.5px;}
.empty-state .g{font-size:32px;margin-bottom:8px;opacity:.5;}

.sel-pet-hero{display:flex;gap:12px;align-items:center;margin-bottom:14px;}
.sel-pet-img{width:64px;height:64px;border-radius:16px;background:var(--s1);border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.sel-pet-img img{width:56px;height:56px;object-fit:contain;image-rendering:pixelated;}
.sel-pet-name{font-size:18px;font-weight:900;font-family:'Nunito',sans-serif;color:var(--t1);}
.sel-pet-how{font-size:11px;color:var(--t3);margin-top:2px;}

.mini-pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mini-pair-box{background:var(--s1);border:1.5px solid var(--border);border-radius:12px;padding:9px 12px;}
.mini-pair-box .t{font-size:9.5px;color:var(--t3);font-weight:800;letter-spacing:1px;margin-bottom:5px;font-family:'Nunito',sans-serif;}
.mini-pair-line{display:flex;justify-content:space-between;font-size:12px;padding:1.5px 0;}
.mini-pair-line span:first-child{color:var(--t3);}
.mini-pair-line b{color:var(--a1);font-family:'Nunito',sans-serif;}
.total-pill{margin-top:8px;text-align:center;background:linear-gradient(135deg,var(--s2),#e0f7fa);
  border:1.5px solid var(--border2);border-radius:10px;padding:9px;}
.total-pill .v{font-size:20px;font-weight:900;font-family:'Nunito',sans-serif;color:var(--a1);}
.total-pill .l{font-size:9.5px;color:var(--t2);font-weight:800;}

.section-title{font-size:10px;letter-spacing:2px;color:var(--t3);font-family:'Nunito',sans-serif;
  font-weight:800;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'';display:block;width:3px;height:14px;
  background:linear-gradient(135deg,var(--a1),var(--a2));border-radius:2px;}

.stat-input-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.stat-input-box{background:var(--s1);border:1.5px solid var(--border);border-radius:16px;padding:12px 14px;}
.stat-input-box .lbl{font-size:11px;color:var(--t3);font-weight:800;margin-bottom:8px;font-family:'Nunito',sans-serif;}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper button{width:32px;height:32px;border-radius:10px;border:1.5px solid var(--border2);
  background:var(--white);color:var(--a1);font-size:16px;font-weight:900;cursor:pointer;flex-shrink:0;}
.stepper button:hover{background:var(--a1);color:#fff;}
.stepper input{width:100%;text-align:center;border:none;background:transparent;font-size:19px;
  font-weight:900;font-family:'Nunito',sans-serif;color:var(--t1);outline:none;}
.stat-atk .lbl{color:var(--a2);} .stat-def .lbl{color:var(--a1);} .stat-agi .lbl{color:var(--a5);} .stat-hp .lbl{color:var(--a4);}

.calc-btn{width:100%;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border:none;
  padding:14px;border-radius:16px;font-weight:900;font-size:15px;cursor:pointer;font-family:'Nunito',sans-serif;
  letter-spacing:.5px;box-shadow:0 6px 18px rgba(47,127,214,.3);}
.calc-btn:hover{filter:brightness(1.06);transform:translateY(-1px);}
.calc-btn:active{transform:scale(.98);}
.fill-btn{width:100%;background:var(--white);border:1.5px solid var(--border2);color:var(--t2);
  padding:11px;border-radius:16px;font-weight:800;font-size:12.5px;cursor:pointer;margin-bottom:10px;}
.fill-btn:hover{border-color:var(--a1);color:var(--a1);}

/* ===== 결과 카드 ===== */
.result-strip{height:4px;border-radius:99px;background:linear-gradient(90deg,var(--a1),var(--a2),var(--a4));margin-bottom:20px;}
.result-inner{display:grid;grid-template-columns:1fr 1fr;gap:0 20px;}
@media(max-width:600px){ .result-inner{grid-template-columns:1fr;} }
.result-left{display:flex;flex-direction:column;}
.result-right{display:flex;flex-direction:column;border-left:1.5px solid var(--border);padding-left:20px;}
@media(max-width:600px){ .result-right{border-left:none;border-top:1.5px solid var(--border);padding-left:0;padding-top:16px;margin-top:8px;} }
.res-badge{display:inline-block;padding:5px 13px;background:linear-gradient(135deg,var(--a1),var(--a2));
  color:#fff;border-radius:99px;font-size:13px;font-weight:800;letter-spacing:.5px;}
.res-prob-big{font-size:60px;font-weight:900;line-height:1.05;font-family:'Nunito',sans-serif;
  background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin:8px 0 12px;}
.res-prob-unit{font-size:32px;}
.res-prob-gold{background:linear-gradient(135deg,#f5a623,#fdd835) !important;-webkit-background-clip:text !important;background-clip:text !important;}
.res-sub-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;}
.res-sub-label{font-size:13px;color:var(--t3);font-weight:600;}
.res-sub-val{font-size:14px;font-weight:800;color:var(--t1);font-family:'Nunito',sans-serif;}
.res-msg-wrap{margin-top:10px;padding:9px 12px;border-radius:12px;background:var(--s1);border:1.5px solid var(--border);
  display:flex;align-items:center;gap:10px;text-align:center;justify-content:center;}
.res-msg-emoji{font-size:22px;display:inline-block;flex-shrink:0;}
.res-msg-text{font-size:13px;font-weight:700;color:var(--t1);line-height:1.5;}
@keyframes emoji-cry{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes emoji-sprout{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes emoji-swing{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
@keyframes emoji-fire{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes emoji-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes emoji-star{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes rainbow{0%{background-position:0% 50%}100%{background-position:200% 50%}}
.anim-cry .res-msg-emoji{animation:emoji-cry 1.8s ease-in-out infinite;}
.anim-sprout .res-msg-emoji{animation:emoji-sprout 2.0s ease-in-out infinite;}
.anim-swing .res-msg-emoji{animation:emoji-swing 2.0s ease-in-out infinite;}
.anim-fire .res-msg-emoji{animation:emoji-fire 1.6s ease-in-out infinite;}
.anim-float .res-msg-emoji{animation:emoji-float 2.4s ease-in-out infinite;}
.anim-star .res-msg-emoji{animation:emoji-star 2.0s ease-in-out infinite;}
.msg-lv6{border-color:var(--a4);background:linear-gradient(270deg,#fff9ee,#fff3d4,#fff5d4,#fff9ee);background-size:300% 300%;animation:rainbow 3s ease-in-out infinite;}
.msg-lv7{background:linear-gradient(270deg,var(--a4),var(--a2),var(--a1),var(--a3));background-size:300% 300%;animation:rainbow 2s linear infinite;border:none;}
.msg-lv7 .res-msg-text{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.2);}
.grade-dist{flex:1;}
.grade-dist-title{font-size:13px;font-weight:800;color:var(--t2);letter-spacing:1px;margin-bottom:10px;}
.grade-dist-total{font-size:11px;font-weight:600;color:var(--t4);font-family:'Nunito',sans-serif;margin-bottom:10px;}
.grade-row{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.grade-lbl{font-size:12px;font-weight:700;color:var(--t3);min-width:36px;text-align:right;font-family:'Nunito',sans-serif;}
.grade-lbl-hall{font-size:12px;font-weight:900;color:#e8962a;min-width:36px;text-align:right;font-family:'Nunito',sans-serif;}
.grade-bar-wrap{flex:1;background:var(--s1);border-radius:99px;height:12px;overflow:hidden;position:relative;}
.grade-bar{height:100%;border-radius:99px;transition:width .4s ease;}
.grade-bar-8{background:linear-gradient(90deg,#f5a623,#fdd835);}
.grade-bar-pos{background:linear-gradient(90deg,var(--a1),var(--a3));}
.grade-bar-zero{background:linear-gradient(90deg,var(--border2),var(--t4));}
.grade-bar-neg{background:linear-gradient(90deg,var(--t4),var(--border2));}
.grade-meta{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:48px;}
.grade-cnt{font-size:12px;font-weight:700;color:var(--t2);font-family:'Nunito',sans-serif;}
.grade-pct{font-size:11px;font-weight:600;color:var(--t4);font-family:'Nunito',sans-serif;}
.result-err{color:var(--err);text-align:center;font-size:14px;padding:8px 0;font-weight:600;}
.result-note{font-size:11px;color:var(--t3);margin-top:14px;line-height:1.6;background:var(--s1);
  border-radius:10px;padding:8px 12px;border:1.5px solid var(--border);grid-column:1/-1;}

footer{text-align:center;padding:30px;color:var(--t3);font-size:11px;font-family:'Nunito',sans-serif;}
@media(max-width:640px){ .page-title{font-size:24px;} .main-inner{padding-top:70px;} }
</style>
</head>
<body>

<button class="toggle-btn" id="toggleBtn">☰</button>

<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="sb-logo"><span class="sb-logo-dot"></span>SA 쟈쟈</div>
    <div class="sb-sub">JYAJYA SERVER TOOLS</div>
  </div>
  <div class="sb-nav">
    <a href="index.html" class="on">🎲 계산기</a>
    <a href="pokedex.html">🐾 도감</a>
  </div>
  <div class="sb-search">
    <input type="text" id="petSearch" placeholder="펫 이름 검색..." autocomplete="off" />
  </div>
  <div class="pet-section" id="petSection">
    <div class="pet-sec-title">전체 펫 목록</div>
    <div id="petList"></div>
  </div>
  <div class="sb-footer">
    <span class="sb-footer-txt" id="loadStatusSb">로딩중...</span>
    <button class="dark-toggle" onclick="toggleDark()"><span class="toggle-moon">🌙</span><span class="toggle-sun">☀️</span></button>
  </div>
</div>

<div class="main" id="main">
  <div class="main-inner">
    <div class="page-head">
      <div class="wind-badge"><span class="wind-badge-dot"></span><span>SA JYAJYA SERVER</span></div>
      <div class="page-title">쟈쟈 환각 계산기</div>
      <div class="page-sub">Lv.1 초기치로 환각(8등급) 확률을 계산해보세요</div>
    </div>

    <div class="card" id="selectedCard">
      <div class="section-title">펫 선택</div>
      <div id="selectedBox">
        <div class="empty-state"><div class="g">🐾</div>왼쪽 ☰ 메뉴에서 펫을 검색해서 선택해줘</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Lv.1 초기치 입력</div>
      <div id="statInputWrap">
        <div class="empty-state"><div class="g">✏️</div>펫을 먼저 선택해줘</div>
      </div>
    </div>

    <div class="card" id="resultCard" style="display:none;"></div>
  </div>
  <footer>SA 쟈쟈서버 비공식 팬 도구 · made by 루믹스</footer>
</div>

let PETS = SEED.slice().filter(p => String(p.how||"").replace(/\s+/g,"").trim() !== "미출시");

const IMG_BASE = "https://sa000001.com/sa2/info/img/";

function num(v){ const n = Number(v); return isFinite(n) ? n : 0; }
function cut2(n){ n=Number(n); if(!isFinite(n)) return "-"; return (Math.floor(n*100)/100).toFixed(2).replace(/\.?0+$/, ""); }
function dropDecimalInt(v){ v=Number(v); return isFinite(v)?Math.floor(v):0; }
function rankInfoB(sum){ if(sum>=100)return 475; if(sum>=95)return 495; if(sum>=90)return 515; if(sum>=85)return 535; if(sum>=80)return 555; return 575; }
function disp(h,a,d,s){ return { h:h*4+a+d+s, a:h*0.1+a+d*0.1+s*0.05, d:h*0.1+a*0.1+d+s*0.05, s:s }; }
function calcStats(r){
  const baseSum = num(r.h0)+num(r.a0)+num(r.d0)+num(r.s0);
  const B = rankInfoB(baseSum);
  const ph=num(r.h0)+num(r.lvup), pa=num(r.a0)+num(r.lvup), pd=num(r.d0)+num(r.lvup), ps=num(r.s0)+num(r.lvup);
  const init = disp(num(r.initPct)*ph/100, num(r.initPct)*pa/100, num(r.initPct)*pd/100, num(r.initPct)*ps/100);
  const growth = disp(ph*B/10000, pa*B/10000, pd*B/10000, ps*B/10000);
  return { init, growth, totalGrowth: growth.a+growth.d+growth.s };
}
function normalizedName(p){ return String(p.name||"").replace(/^\uFEFF/, ""); }
function imgTag(code, cls){
  return `<img class="${cls||''}" src="${IMG_BASE}${code}.png" loading="lazy"
    onerror="this.onerror=function(){this.onerror=null;this.src='${IMG_BASE}placeholder.gif';};this.src='${IMG_BASE}${code}.gif';" />`;
}

function setSidebar(open){
  sidebar.classList.toggle("open", open);

  mainEl.classList.toggle("shifted", open);
  toggleBtn.textContent = open ? "✕" : "☰";

}

/* ===== 펫 목록 ===== */
function renderPetList(filterQ){
  const box = document.getElementById("petList");
  const q = (filterQ||"").trim();
  const list = q ? PETS.filter(p => normalizedName(p).includes(q)) : PETS;
  if(!list.length){ box.innerHTML = '<div style="padding:10px;color:var(--t3);font-size:12px;">검색 결과 없음</div>'; return; }
  box.innerHTML = list.map(p => {
    const idx = PETS.indexOf(p);
    const isActive = selectedPet && normalizedName(selectedPet) === normalizedName(p);
    return `<div class="pet-item ${isActive?'active':''}" data-idx="${idx}">${imgTag(p.imageCode)}<span class="pet-item-name">${normalizedName(p)}</span></div>`;
  }).join("");
}
document.getElementById("petSearch").addEventListener("input", e=>{ renderPetList(e.target.value); });
document.getElementById("petList").addEventListener("click", e=>{
  const item = e.target.closest(".pet-item"); if(!item) return;
  selectPet(parseInt(item.dataset.idx));
  if(window.innerWidth <= 820) setSidebar(false);
});

function selectPet(idx){
  selectedPet = PETS[idx];
  renderPetList(document.getElementById("petSearch").value);
  renderSelectedBox();
  renderStatInputs();
  document.getElementById("resultCard").style.display = "none";
}

}

/* ===== 환각 계산기 브루트포스 (실제 서버 계산 방식) ===== */
const HWANGAK_BASE_POOL = 10;
const HWANGAK_TOTAL_COMBOS = 178750; // 5^4(성장베이스 조합) x 286(배분치 조합)

/* 실제로 존재 가능한 8등급(성장베이스 전부 +2) 예시 초기치 — 배분치 10포인트를 4스탯에 최대한 고르게 분배 */
function example8GradeInit(r){
  // 10을 4스탯에 고르게: [3,3,2,2] 순서로 내구/공격/방어/순발에 배분
  const init = calcInitWithRollBase(r, 2,2,2,2, 3,3,2,2);
  return { h: dropDecimalInt(init.h), a: dropDecimalInt(init.a), d: dropDecimalInt(init.d), s: dropDecimalInt(init.s) };
}
function calcInitWithRollBase(r, rh, ra, rd, rs, hb, ab, db, sb){
  const ph = num(r.h0)+num(r.lvup)+num(rh)+num(hb);
  const pa = num(r.a0)+num(r.lvup)+num(ra)+num(ab);
  const pd = num(r.d0)+num(r.lvup)+num(rd)+num(db);
  const ps = num(r.s0)+num(r.lvup)+num(rs)+num(sb);
  return disp(num(r.initPct)*ph/100, num(r.initPct)*pa/100, num(r.initPct)*pd/100, num(r.initPct)*ps/100);
}

function getAllHwangakMatches(r, targetH, targetA, targetD, targetS){
  const matches = [];
  for(let rh=-2; rh<=2; rh++)
  for(let ra=-2; ra<=2; ra++)
  for(let rd=-2; rd<=2; rd++)
  for(let rs=-2; rs<=2; rs++)
  for(let ab=0; ab<=HWANGAK_BASE_POOL; ab++)
  for(let db=0; db<=HWANGAK_BASE_POOL-ab; db++)
  for(let sb=0; sb<=HWANGAK_BASE_POOL-ab-db; sb++){
    const hb = HWANGAK_BASE_POOL - ab - db - sb;
    const init = calcInitWithRollBase(r, rh, ra, rd, rs, hb, ab, db, sb);
    const ch=dropDecimalInt(init.h), ca=dropDecimalInt(init.a), cd=dropDecimalInt(init.d), cs=dropDecimalInt(init.s);
    if(ch!==targetH || ca!==targetA || cd!==targetD || cs!==targetS) continue;
    matches.push({ grade: rh+ra+rd+rs, h:rh,a:ra,d:rd,s:rs, fh:hb,fa:ab,fd:db,fs:sb });
  }
  return matches;
}

function formatPct(n){
  if(!isFinite(n)) return "0%";
  if(n === 0) return "0%";
  if(n < 0.0001) return "< 0.0001%";
  return n.toFixed(4) + "%";
}

function getProbMsg(p){
  const n = parseFloat(p);
  if(n === 0) return {lv:1, anim:'anim-cry', emoji:'😭', text:'이 초기치로는 환각 확률이 없어요..ㅠ'};
  if(n < 1) return {lv:1, anim:'anim-sprout', emoji:'🌱', text:'도전하는 자가 환각을 가진다!'};
  if(n < 5) return {lv:2, anim:'anim-swing', emoji:'🎰', text:'슬롯머신 돌리는 기분이지만 당신이라면 뽑을 수 있어요'};
  if(n < 10) return {lv:3, anim:'anim-fire', emoji:'🍀', text:'충분히 가능성 있어요! 도~전!'};
  if(n < 30) return {lv:4, anim:'anim-fire', emoji:'🔥', text:'매우 좋은 확률입니다! 미리 축하해요!'};
  if(n < 50) return {lv:5, anim:'anim-float', emoji:'💎', text:'큰 거 왔다! 이 정도면 떴다고 봐야죠!'};
  if(n < 80) return {lv:6, anim:'anim-star', emoji:'🌟', text:'황금 손 맞으시죠?'};
  return {lv:7, anim:'', emoji:'👑', text:'당신은 선택받은 자입니다'};
}

function runCalc(){
  const p = selectedPet;
  const hp = parseInt(document.getElementById("calcHp").value, 10);
  const atk = parseInt(document.getElementById("calcAtk").value, 10);
  const def = parseInt(document.getElementById("calcDef").value, 10);
  const dex = parseInt(document.getElementById("calcDex").value, 10);
  const rc = document.getElementById("resultCard");

  if([hp,atk,def,dex].some(v=>!isFinite(v))){
    rc.innerHTML = '<div class="result-err">내구/공격/방어/순발 4칸 모두 정수로 입력해줘.</div>';
    rc.style.display = "block";
    return;
  }
  rc.innerHTML = '<div class="empty-state"><div class="g">⏳</div>계산 중...</div>';
  rc.style.display = "block";

  setTimeout(()=>{
    const matches = getAllHwangakMatches(p, hp, atk, def, dex);
    const totalCases = matches.length;
    const totalPossible = HWANGAK_TOTAL_COMBOS;

    if(totalCases === 0){
      rc.innerHTML = '<div class="result-err">일치하는 경우가 없습니다.<br>다른 스탯 값으로 시도해 주세요</div>';
      return;
    }

    const gradeDist = {};
    let hallCases = 0;
    matches.forEach(m=>{
      gradeDist[m.grade] = (gradeDist[m.grade]||0) + 1;
      if(m.grade === 8) hallCases++;
    });

    const prob = Math.min((hallCases/totalCases)*100, 99.99).toFixed(4);
    const appear = formatPct((totalCases/totalPossible)*100);
    const canMax = hallCases > 0;
    const expect = canMax ? (1/(prob/100)).toFixed(2) : null;

    const topGrade = Object.keys(gradeDist).map(Number).sort((a,b)=>b-a)[0];
    const isGold = topGrade === 8 && canMax;
    const maxGradeCnt = Math.max(...Object.values(gradeDist));

    const gradeRows = Object.keys(gradeDist).map(Number).sort((a,b)=>b-a).filter(g=>gradeDist[g]>0).map(g=>{
      const cnt = gradeDist[g];
      const pct = (cnt/totalCases*100).toFixed(1);
      const barW = (cnt/maxGradeCnt*100).toFixed(1);
      const isHall = g === 8;
      const barClass = isHall ? 'grade-bar-8' : g > 0 ? 'grade-bar-pos' : g === 0 ? 'grade-bar-zero' : 'grade-bar-neg';
      return `<div class="grade-row">
        <span class="${isHall?'grade-lbl-hall':'grade-lbl'}">${g}등급</span>
        <div class="grade-bar-wrap"><div class="grade-bar ${barClass}" style="width:${barW}%"></div></div>
        <div class="grade-meta"><span class="grade-cnt">${cnt}건</span><span class="grade-pct">${pct}%</span></div>
      </div>`;
    }).join("");

    const msg = getProbMsg(canMax ? prob : '0');

    rc.innerHTML = `
      <div class="result-strip"></div>
      <div class="result-inner">
        <div class="result-left">
          <div style="margin-bottom:6px;"><span class="res-badge">✦ 8등급 환각 확률</span></div>
          <div style="display:flex;align-items:flex-end;gap:24px;margin:8px 0 12px;">
            <div class="res-prob-big ${isGold?'res-prob-gold':''}">${prob}<span class="res-prob-unit">%</span></div>
            <div style="padding-bottom:14px;line-height:1.4;">
              <div style="font-size:11px;color:var(--t2);font-weight:700;font-family:'Nunito',sans-serif;letter-spacing:.3px;text-align:center;">최고 매칭</div>
              <div style="display:block;margin-top:3px;padding:3px 9px;text-align:center;border-radius:8px;background:${isGold?'linear-gradient(135deg,#fff5cc,#ffe988)':'var(--s2)'};border:1.5px solid ${isGold?'#f5c842':'var(--border2)'};font-size:15px;font-weight:900;color:${isGold?'#c87800':'var(--a1)'};font-family:'Nunito',sans-serif;">${topGrade}등급</div>
            </div>
          </div>
          <div class="res-sub-row"><span class="res-sub-label">등장 확률</span><span class="res-sub-val">${appear}</span></div>
          <div class="res-sub-row"><span class="res-sub-label">기대 시도 횟수</span><span class="res-sub-val">${canMax?"약 "+expect+"회":"환각 불가"}</span></div>
          <div style="margin-top:6px;border-top:1px solid var(--border);padding-top:4px;"></div>
          <div class="res-sub-row"><span class="res-sub-label">매칭</span><span class="res-sub-val">${totalCases}</span></div>
          <div class="res-sub-row"><span class="res-sub-label">환각</span><span class="res-sub-val">${hallCases}</span></div>
          <div class="res-msg-wrap msg-lv${msg.lv} ${msg.anim}">
            <span class="res-msg-emoji">${msg.emoji}</span><span class="res-msg-text">${msg.text}</span>
          </div>
        </div>
        <div class="result-right">
          <div class="grade-dist">
            <div class="grade-dist-title">등급 분포</div>
            <div class="grade-dist-total">총 ${totalCases}건 / ${totalPossible.toLocaleString()}건</div>
            ${gradeRows}
          </div>
        </div>
        <div class="result-note">표기: 성장베이스(-2~+2, 4스탯 합산 = 등급) × 배분치(4스탯에 총 10포인트 무작위 배분, Lv.1 초기치에만 영향). 8등급(전스탯 +2)이 곧 환각입니다.</div>
      </div>
    `;
  }, 30);
}

/* ===== 데이터 로딩 (local json → 라이브 fetch → 내장샘플 순서, 조용히 폴백) ===== */
function setStatus(msg){
  document.getElementById("loadStatusSb").textContent = msg;
}
function applyData(rows){
  PETS = rows.filter(p => String(p.how||"").replace(/\s+/g,"").trim() !== "미출시");
  renderPetList("");
  const url = new URL(window.location.href);
  const wantName = url.searchParams.get("pet");
  if(wantName){
    const hit = PETS.find(p => normalizedName(p) === wantName) || PETS.find(p => normalizedName(p).includes(wantName));
    if(hit){ selectPet(PETS.indexOf(hit)); }
  }
}
async function fetchJson(url){
  const res = await fetch(url + (url.includes("?") ? "&" : "?") + "ts=" + Date.now(), {cache:"no-store"});
  if(!res.ok) throw new Error("http " + res.status);
  const data = await res.json();
  const rows = data.rows || data;
  if(!Array.isArray(rows) || rows.length === 0) throw new Error("empty rows");
  return rows;
}
async function loadLive(){
  setStatus("데이터 불러오는 중...");
  try{
    const rows = await fetchJson("./pet_data.json");
    applyData(rows);
    setStatus(`${PETS.length}종 · 레포 동기화본`);
    return;
  }catch(e){}
  try{
    const rows = await fetchJson(API_URL);
    applyData(rows);
    setStatus(`${PETS.length}종 · 실시간 직접연동`);
    return;
  }catch(e){}
  applyData(PETS);
  setStatus(`${PETS.length}종 · 내장 샘플`);
}
renderPetList("");
loadLive();
</script>
